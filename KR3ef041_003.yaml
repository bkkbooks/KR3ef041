body:
  text: 卷下百合狐惑目赤黑陰毒陽毒總論嘗讀仲景書至金匱要略第三論乃以陰陽二毒之症附於百合狐惑目赤黑之尾反覆玩之而知斯五症皆奇症也百合之狀欲食不食欲臥不臥欲行不行如寒無寒如熱無熱狀如神靈何其奇也狐惑之狀默默欲眠目不得瞑蝕喉為惑蝕陰為狐面目乍赤乍黑乍白又何其奇也目赤黑之狀不熱而煩默默欲臥三四日目赤七八日眥黑又何其奇也陽毒則面赤如錦咽痛吐血陰毒則面目俱青咽痛身如被杖俱以五日可治七日不可治及其施治則二症均用升麻鱉甲湯則不可解已在陽毒之熱反加蜀椒在陰毒之寒反去蜀椒則更不可解矣味其敘陽毒不過曰面赤咽疼唾膿血而已並不言亢陽極熱之狀也其敘陰毒不過曰面青咽痛身如被杖而已並不言至陰極寒之狀也其所用劑不過升麻甘草鱉甲當歸而已並不用大寒大熱之藥也乃知仲景所謂陽毒者感天地惡毒之異氣入於陽經則為陽毒入於陰經則為陰毒故其立方但用解毒之品未嘗以桂附薑茱治陰芩連硝黃治陽也後世名家不深察仲景之旨遂以陽毒為陽症之甚者而用寒涼陰毒為陰症之甚者而用溫熱殊不知仲景論療陽症狀極其熱而藥極其寒論療陰症狀極其寒而藥極其熱已無餘蘊而何必別出名色乎至其治陽毒反投蜀椒者椒本解毒之品從其類而治之也陰毒反去蜀椒者為升麻鱉甲既屬清涼只覺蜀椒為贅矣若以陽毒為極熱何不投涼劑而反入蜀椒耶若以陰毒為極寒何不投溫劑而反去蜀椒耶是知如上五症皆奇異而罕覯者此金匱總類於一條之中良有説也故凡學者讀前賢之書不得草草看過必深思而明辨之庶乎入仲景之室耳百合無分經絡百脈一宗悉致其病也欲食不能食欲臥不能臥欲行不能行如寒無寒如熱無熱口苦小便赤時常默默藥不能治得藥則吐如有神靈其形如和其脈微數每溺時頭痛者六十日愈溺時頭不痛淅然者四十日愈若溺時快然但頭眩者二十日愈百合病汗後者百合知母湯下後者滑石代赭湯吐後者百合雞子湯不經汗吐下者百合地黃湯百合病一月不解變成渴者百合洗法不瘥栝蔞牡蠣湯百合病變發熱者百合滑石湯狐惑狀如傷寒默默欲眠目不得閉臥起不安蝕於喉為惑蝕於陰為狐不欲飲食惡聞食臭面目乍赤乍黑乍白蝕於上部則聲喝甘草瀉心湯蝕於下部則咽乾苦參湯洗之蝕於肛雄黃一味為末取艾肭拌勻以二瓦合之燒向肛門熏之目赤黑此症後賢遺而不論及或混雜於狐惑症中尤為可笑也脈數無熱微煩默默欲臥汗出初得之三四日目赤如鳩眼七八日目四眥黑若能食者膿已成也赤豆當歸散按此症乃目瘍也當其未成膿時毒氣未出故腹滿不能食及膿成毒出則腹舒故能食也陽毒面赤斑斑如錦紋咽喉痛吐膿血五日可治七日不可治升麻鱉甲湯陰毒面目青身痛如被杖咽喉痛五日可治七日不可治升麻鱉甲湯去雄黃蜀椒按後賢所論陰毒皆陰症之重者陽毒乃陽症之甚者並非仲景的旨故悉刪去舌卷囊縮厥陰危惡之症扁鵲孫真人皆斷為死症仲景無治法今採南陽海藏治法有陰陽之殊至於女人乳頭縮者即同此症厥陰病尺寸俱沉短者必舌卷囊縮毒氣入腹大承氣湯煩滿囊縮二便不通發熱引飲邪在裡也大承氣湯厥逆爪青二便不通地道塞也正陽散或回陽丹漱水不欲咽內有熱者必喜飲水今欲水而不欲咽是熱在經而里無熱也此症屬在陽明經此經氣血俱多經中熱甚逼血妄行必將衄也蓄血症燥而不渴多見此症陰症發躁煩渴不能飲水或勉強咽下少頃即吐出或飲下便嘔逆皆內真寒而外假熱也蓋無根失守之火遊於咽嗌之間假作燥渴故不能飲也陽明身熱頭痛口燥漱水不欲入咽必衄血脈微犀角地黃湯茅花湯無表症不寒熱胸腹滿唇口燥漱水不咽小便多此為瘀血必發狂輕者桃仁承氣湯甚者抵當丸少陰脈沉細厥逆漱水不欲咽四逆湯下利厥逆無脈乾嘔煩渴漱水不欲咽白通湯加豬膽汁人尿吐蛔口燥舌乾但欲涼水浸舌及唇不欲咽理中湯加烏梅過經不解傷寒十三日不解謂之過經脈尺寸陷者大危過經不解柴胡症未罷小柴胡湯和之嘔不止心下鬱郁微煩大柴胡湯形弱脈虛參胡三白湯虛煩不眠溫膽湯加人參柴胡壞病汗吐下後仍不解者此名壞病桂枝不中與也審其脈症知犯何逆隨症治之或因誤汗或因誤吐或因誤下皆不順於理故曰逆也太陽病不解轉入少陽脅下硬滿乾嘔往來寒熱未吐下脈沉緊小柴胡湯汗吐下後柴胡症罷此為壞症知犯何逆以法治之按傷寒既久汗吐下後邪氣漸平正氣漸薄陽亡於外陰竭於內自非大補寧有生機蘇韜光云好參一兩作一服鼻梁上涓涓微汗是其應也未效當更與之古人以治壞症屢屢回生如有兼症必以人參為主隨症調之真良法也身熱惡寒身寒惡熱身大熱反欲近衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也按丹溪云大熱當喜冷反欲得衣者表氣虛不足以自溫其人陰弱陽無所附飛越而出發為大熱宜作陰虛治之大寒反不欲衣者邪郁膚腠表氣大實宜作邪郁治之趙嗣真云虛弱表寒之人感邪發熱熱邪浮淺不勝沉寒故外怯而欲衣也治宜辛溫壯盛素熱之人感邪之初寒未變熱陰邪閉於伏熱陰凝於外熱鬱於內故內煩而不欲衣也治宜辛涼二説雖殊各有至理學者當因症察之表熱裡寒表寒裡熱傷寒脈浮此表有熱里有寒白虎湯少陰下利清穀裡寒外熱手足厥逆脈微反不惡寒面赤或腹痛或嘔或咽痛或利止脈不出通脈四逆湯既吐且利小便復利大汗出下利清穀內寒外熱脈微四逆湯下利清穀裡寒外熱汗出而厥通脈四逆湯脈浮而遲表熱裡寒下利清穀四逆湯熱多寒少太陽病發熱惡寒熱多寒少脈微弱者無陽也不可汗桂枝二越婢一湯太陽病七八日如瘧狀發熱發寒熱多寒少不嘔清便欲自可一日二三度發脈微緩為欲愈脈微惡寒此陰陽俱虛不可汗吐下也面色反熱者未欲解也以其不得小汗出身必癢桂枝麻黃各半湯風濕相搏須知此症脈必浮虛而澀若沉實滑大數者非也傷寒八九日風濕相搏身體煩疼不能轉側不嘔不渴脈浮虛而澀桂枝附子湯若大便硬小便自利桂枝去桂加白朮風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫甘草附子湯陰陽易病傷寒未全瘥因於交接而無病之人反得病也易者邪毒之氣交相易換也男子病新瘥婦人與之交而得病名曰陽易婦人病新瘥男子與之交而得病名曰陰易其候身重氣乏百節解散頭重不舉目中生花熱上中胸火浮頭面憎寒壯熱在男子則陰腫小腹絞痛在婦人則裡急連腰胯內痛甚者手足冷攣蜷男子卵陷入腹婦人痛引陰中皆難治也若吐舌出數寸者必死易病陽症燒裩散竹皮湯陰症猳鼠屎湯當歸白朮湯大便不通昏亂驚惕妙香丸按陰陽易病得離經脈者死太過而一呼三至曰至不及而一呼一至曰損此離於經常之脈也惟易病有之房勞復瘥後犯房事而熱名房勞復其候頭重眼花腰背痛小腹裡急心胸煩悶房勞頭重目花小腹絞痛赤衣散燒裩散竹皮湯選用虛弱脈微四君子湯送燒裩散勞復大病新瘥最忌思慮傷神多言耗氣梳浴行動太早則因勞發熱復病如初勞復發熱小柴胡主之脈浮汗解脈沉下解勞神歸脾湯氣弱脈細補中益氣湯一切勞復鱉甲為末炒黃米湯送下食復凡病瘥後先進清粥湯次進濃粥湯次進糜粥亦須少少與之切勿令任意過食也至於酒肉尤當禁忌若有不謹便復發熱名為食復食復輕者香砂枳朮湯重者枳實梔子豉湯酒復小柴胡加葛根黃連遺毒汗下不徹餘邪熱毒結於耳後名曰發頤宜速消散之稍緩即成膿矣餘毒發頤可消者用連翹敗毒散若不可消者不問已破未破俱用內托消毒散瘥後昏沉瘥後數日漸見昏沉或錯語呻吟如見鬼狀皆因餘熱蘊在心胞絡脈浮者微汗之小柴胡湯加紫蘇知母生地虛甚歸脾湯加黃連竹葉瘥後發豌豆瘡餘毒發瘡黃連甘草荊防連翹煎服外用赤小豆為末入青黛以雞子清和塗神效瘥後發腫水氣浮腫壯實者以商陸少許煮粥食之脾虛發腫四君子五苓散合服足腫大米茯苓苡仁煎湯代茶瘥後喜唾胃中虛寒不納津液故喜唾理中湯加益智仁臟結臟氣閉結不能流通也外症如結胸狀但飲食如故時時下利為異耳寸脈浮關脈沉細而緊陰筋引臍腹而痛也脅下有痞氣連在臍旁痛引小腹陰筋此冷臟結必死藏結無陽症不往來寒熱其人反靜舌上胎滑不可攻也茱萸四逆湯宜灸關元穴痙俗作痙誤也今正之病身熱足冷項強惡寒頭痛面目赤頭搖口噤手足攣搐角弓反張太陽先傷風復感寒無汗為剛痙先傷風復感濕有汗為柔痙脈浮緊口渴仰面開目為陽易治脈沉不渴合而閉目為陰難治或風淫為實或血枯為虛也太陽病身體強脈反沉遲栝蔞桂枝湯太陽無汗小便反少氣上衝口噤不語葛根湯剛痙胸滿口噤臥不著席腳攣急必齘齒大承氣湯血枯筋無所養十全大補湯大頭瘟天行疫毒邪犯高巔分別三陽經而施治發於項上並腦後目後赤腫太陽也荊芥敗毒散發於鼻額以至面目閉陽明也通聖消毒散發於耳之上下前後並頭角者少陽也小柴胡湯加荊芥芩連三陽俱受邪普濟消毒飲風溫汗後熱名曰風溫脈浮自汗身重多眠鼻鼾不語此先受溫熱復感於風也風溫忌汗葳蕤湯熱加知母乾葛湯加栝蔞身重汗出防己湯傷濕身重痛小便不利與太陽傷寒相似但脈沉細為異耳一身盡痛日晡發熱風濕也麻黃杏仁苡仁甘草湯頭汗出背強欲得被覆向火者寒濕理中湯合胃苓湯關節痛而煩脈沉細當利小便甘草附子湯濕溫先傷於濕復傷於暑名曰濕溫腹滿目痛多汗妄言足冷寸脈浮弱尺小而急濕溫白虎加蒼朮湯不可發汗汗之名重暍必死溫瘧此傷寒壞病也前熱未除復感寒邪變為溫瘧寒熱往來口苦胸滿小柴胡加桂枝芍藥湯煩渴用人參白虎湯中暑中暍納涼於廣廈涼亭乘風揮扇多食冰冷瓜果靜而得之名為中暑奔役於赤日炎威之中負重遠行不得休息動而得之名為中暍脈虛汗多身熱煩渴中暑面垢自汗煩渴人參白虎加蓮薷扁豆心胞絡受邪熱甚昏而不醒香薷湯冷服須加黃連足冷脈沉理中湯中暍大熱煩渴蒼朮白虎湯按中暑為陰症陽氣為陰寒壅遏法當辛溫中暍為陽症熱火熏灼法當清涼凡熱死切勿便與冷水及冷物逼其外即不可救須置於暖處取路上熱土於臍上作窩溺熱尿於中此為良法或以曬熱瓦尉其心腹亦佳宜蘇合香丸湯調灌之或熱土大蒜同研熱水調去渣灌之婦人傷寒治法皆與男子相同但熱入血室與胎前産後則不同也婦人傷寒經水適來晝則明瞭夜則譫語此名熱入血室小柴胡湯加生地丹皮歸尾枳殼妊娠傷寒安胎為主不可過於汗下有表者羌活沖和湯加當歸芍藥燥渴便閉小承氣湯大黃鬚酒炒直中寒症理中湯加桂護胎法井底泥青黛伏龍肝等分加面少許水調塗臍下二寸許干則再塗産後傷寒血氣空虛勿輕汗下有表症者四物湯加羌活蘇葉蒼朮蔥頭燥渴便閉四物湯加枳殼酒炒大黃厚朴汗下太過遂變鬱冒昏迷筋惕肉瞤八珍湯加乾薑主之太陽篇七十三方桂枝湯桂枝芍藥甘草生薑大棗太陽中風陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱者此方主之桂枝本為解肌若脈浮緊發熱無汗者不可服也蓋桂枝湯本主太陽中風腠疏自汗風邪干衛者乃為相宜仲景以解肌為輕發汗為重故汗吐下後身痛者津液耗也雖有表邪止可用桂枝解肌也內經曰風淫於內以辛散之以酸收之以甘緩之故以桂枝為君芍藥為臣甘草為佐薑棗為使薑棗行脾之津液而和營衛者也麻黃湯不用薑棗者為其專於發汗不待行化津液自通耳桂枝麻黃二湯為冬月傷寒而設若春溫夏熱之病決不可用麻黃湯麻黃桂枝甘草杏仁主太陽頭痛發熱身疼腰痛骨節痛惡寒無汗而喘本草云輕可去實麻黃是也實者謂寒邪在表腠密無汗而表實也麻黃為輕劑專主發散是以為君表實者非桂枝所能獨散所以為臣內經曰寒淫於內治以甘熱佐以辛苦甘草甘平杏仁甘苦用以為佐經所謂肝苦急急食甘以緩之也且桂枝湯治風傷衛則衛實營弱故佐以芍藥和其營血也麻黃湯治寒傷營則營實衛虛故佐以杏仁利其衛氣也大青龍湯麻黃桂枝甘草杏仁生薑大棗石膏主傷寒見風脈浮緩身不疼但重乍有輕時無少陰症者宜之青龍者東方木神也應春而主肝專發生之令為敷榮之主萬物出甲則有兩岐肝有兩葉以應之謂之青龍者發散營衛兩傷之邪也桂枝主風麻黃主寒此則傷寒見風所以處青龍湯兩解風寒也寒傷營必以甘緩之風傷衛必以辛散之此風寒兩傷必用辛甘相合而療之是以麻黃為君桂枝為臣甘草甘平杏仁甘苦佐麻黃以發表大棗甘溫生薑辛溫佐桂枝以解肌夫風寒兩傷非輕劑可以獨散必須以輕重之劑同散之是以用石膏之苦辛質重而又達肌為使也此湯為發汗重劑用之稍過即有亡陽之害故仲景戒多服也服藥後汗不止將病人發披水盆中露足出外以溫粉周身撲之白朮藁本川芎白芷等分細末每藥末一兩入米粉三兩小青龍湯麻黃芍藥細辛乾薑甘草炙桂枝五味子半夏主表邪不解心下有水氣青龍象肝木之兩岐主兩傷之疾麻黃湯散寒桂枝湯散風若表不解而心下有水氣為表裡兩傷須小青龍祛表裡之邪麻黃辛溫為發散之君桂枝辛熱甘草甘平為發散之臣芍藥酸寒五味酸溫寒飲傷肺則咳喘而肺氣逆經曰肺欲收急食酸以收之故芍藥五味子為佐以收逆氣心下有水津液不行則腎燥經曰腎苦燥急食辛以潤之故以乾薑辛熱細辛辛溫半夏微溫為使以散寒水如是則津液通行汗出而解心下有水氣變症多端故立加減之法渴者去半夏加栝蔞根水蓄則津液不行氣燥而渴半夏性燥去之則津易復栝蔞性潤加之則津易生微利者去麻黃加芫花水漬腸胃則為利下利不可發表發之必脹滿故去麻黃酸苦能湧泄水去則利止故加芫花經曰水得冷氣其人即噎胃寒非表症故去麻黃辛熱能溫中故加附子若小便不利病在下焦甘淡者下滲故加茯苓發散者上行故去麻黃喘則氣上法當降下麻黃輕揚而上是以去之杏仁苦泄而下是以加之桂枝葛根湯葛根芍藥甘草生薑桂枝大棗主太陽病項背強𠘧𠘧及汗出惡風按詩豳風狼跋云赤寫𠘧𠘧注云𠘧𠘧拘貌言不敢左右顧視也藉以喻項強之狀也表邪方盛不當有汗今反汗出風傷衛也故以桂枝解肌葛根發表芍藥和營甘草甘平薑棗和胃葛根湯葛根麻黃桂枝芍藥甘草生薑大棗主太陽病項背強𠘧𠘧無汗惡風𠘧𠘧注見前舊釋鳥羽未當今正之此方即桂枝湯加麻黃葛根以其無汗表實故用二物發表所謂輕可去實也按太陽病有汗用桂枝無汗用麻黃確乎不可易矣此復以太陽無汗用葛根湯太陽有汗用桂枝葛根湯何也葛根本陽明經藥恐太陽病久將傳陽明故用葛根迎而奪之豫發其邪勿令傳入也前用桂枝湯麻黃湯者病方起也今用此二方者病已久也又按太陽病脈靜為不傳若煩躁脈數為欲傳也意者既見其欲傳之狀故用此二方此未發之祕旨桂枝麻黃各半湯桂枝芍藥生薑甘草麻黃大棗杏仁太陽病八九日如瘧狀熱多寒少不嘔清便一日二三度發脈微緩為欲愈脈微惡寒不可汗吐下面反有熱色未欲解也以不得汗身必癢此方論當分作三段看太陽病至寒少一段為自初至今之症下文皆擬病防變之辭至欲愈一段言不必治也至不可汗吐下言宜溫之也至末一段是小汗之麻黃與桂枝一發一止則汗不至大出矣桂枝二麻黃一湯不録桂枝二越婢一湯桂枝芍藥甘草生薑大棗麻黃石膏太陽病發熱惡寒熱多寒少脈微弱者無陽也不可發汗胃為十二經之主脾治水穀屬土居下為卑臟有若婢然經曰脾主為胃行其津液所以謂之越婢者以其發越脾氣通行津液也凡仲景稱太陽病者皆表症發熱惡寒頭項強痛也若脈浮大則與症相應宜發其汗今表症見而脈反微是脈不應症故不可發汗但用此方和之而已桂枝去桂加茯苓白朮湯芍藥甘草生薑白朮茯苓大棗主汗下後仍頭項強痛發熱無汗心下滿微痛小便不利頭項強痛邪仍在表何故去桂而加苓朮耶不知此屬飲症也既經汗下而不解心下滿痛小便不利此為水飲內蓄邪不在表故去桂加苓朮也若小便利則水飲行而熱滿頭痛無不悉愈矣桂枝加芍藥生薑人參新加湯桂枝芍藥甘草人參大棗生薑主汗後身體痛脈沉遲汗後身痛邪未盡也脈來沉遲血不足也經曰脈沉者營氣微也與桂枝湯以解未盡之邪加芍藥參薑以補不足之血夫身痛一也以脈浮緊為邪盛盛者損之以脈沉遲為血虛虛者補之此之身痛因血虛而致誤作表實而發之則血愈虛而危矣桂枝附子湯桂枝附子大棗生薑甘草傷寒八九日風濕相搏身痛煩不能轉側不嘔不渴脈浮虛而澀病至八九日則邪多在裡身當不痛今日數多而身痛不能轉側者濕也經曰風則浮虛又曰澀為寒濕不嘔不渴里無邪熱也脈浮虛而澀身有煩疼則知風濕但在經也與桂枝附子湯以散表中風濕風在表者散以桂枝之辛甘濕在經者逐以附子之辛熱薑棗同甘草行營衛而通津液以和其表也桂枝加附子湯悉照前方加芍藥脈浮為風大為虛風則微熱虛則痙攣宜與桂枝加附子湯厥逆咽乾煩躁陽明內結譫語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯乃脛伸以承氣湯微溏則止其譫語甘草乾薑湯甘草乾薑芍藥甘草湯芍藥甘草浮為風合用桂枝湯大為虛虛而脛攣者寒則筋急也非附子不能溫經以舒筋故加之厥逆咽乾煩躁此陰躁也雖內結譫語而陽氣未回故以甘草乾薑溫理中氣為脾主四肢又甘能緩急也及陽氣已還則除去溫劑雖脛尚拘急不過以芍藥和營而已直待脛伸寒症盡去然後以承氣止其譫語蓋內結者非承氣不能除耳一症也始而大溫之既而微溫又既而微寒之終而大寒之非有見垣之智者未易語此後人遇此症豈復能出此手眼耶桂枝附子去桂加白朮湯白朮甘草附子生薑大棗主風濕相搏身痛不嘔渴脈虛澀若其人大便硬小便利者宜與此湯仲景云初服之其人身如痹半日許復服之三服盡其人如冒狀勿怪此以朮附並走皮內逐水氣未得除故耳當加桂四兩此本一方二法以大便硬小便利故去桂也以大便不硬小便不利當加桂附甘草附子湯甘草白朮桂枝附子風濕相搏骨節痛不能屈伸汗出短氣小便不利惡風或身微腫身腫加防風小便不利加茯苓芍藥附子甘草湯芍藥甘草附子發汗不解反惡寒者虛也當與此湯汗後病解則不惡寒汗後病不解而表實者亦不惡寒今汗後不解又反惡寒營衛俱虛也汗出則營虛惡寒則衛虛故以芍藥之酸收斂津液而益營附子之辛熱固陽氣而補衛甘草調和辛酸而安正氣也桂枝去芍藥湯桂枝甘草生薑大棗太陽下後脈促胸滿若微寒加附子名桂枝去芍藥加附子湯胸滿者不利於酸收故去芍藥其曰微寒者非表寒乃里寒也故加附子祛寒而消滿也柴胡加桂枝湯桂枝黃芩人參甘草芍藥生薑大棗柴胡半夏傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外症未去傷寒至六七日邪當傳裡之時也支結者支撑而結也嘔而心下結者里症也本當攻裡然發熱惡寒為外症未去不可攻裡與柴胡桂枝湯以和解之南陽云外症未解心下妨悶謂之支結非痞也不可不辨白虎湯知母石膏甘草粳米吐下後七八日不解熱結在裡表裡俱熱脈浮滑大渴而煩按仲景云傷寒脈浮滑此表有熱里有寒白虎湯主之疑必有誤又云熱結在裡表裡俱熱大渴飲水白虎湯主之又云表不解者不可與白虎湯又陽明一症云表熱裡寒四逆湯主之又少陽一症云裡寒外熱通脈四逆湯主之乃知其言脈浮滑表熱裡寒者必表裡二字傳訛也即仲景數論而斷之豈有里既寒而反用大寒之劑乎豈有裡寒而脈浮滑者乎豈有裡寒而大熱煩渴者乎故知白虎為陽明大熱而設其曰里有寒者定瘥無疑也成氏隨文注釋惑誤後人不得不詳為之辨也白虎西方金神也應秋而歸肺表裡俱熱金被火囚用辛寒以救肺所以名為白虎也活人謂夏月陰氣在內宜戒白虎明理論云立秋後不可服恐白虎大寒將變虛羸不食二説俱偏矣有是病即當服是藥安可拘於時哉設使秋冬病苟無表症而大熱煩渴便與白虎為對症之良劑矣雖欲不用其可得乎白虎加人參湯知母石膏甘草粳米人參主太陽中暍發熱惡寒脈微弱手足逆冷而渴者白虎加人參湯又曰身無大熱口渴心煩背微惡寒者白虎加人參湯主之傷寒脈浮發熱無汗其表不解不渴者宜麻黃湯渴者宜五苓散並非白虎所宜也惟大渴飲水無表症者乃可與白虎加人參以除裡熱五苓散豬苓澤瀉茯苓桂白朮太陽汗後胃干煩躁不眠欲飲水者少少與之脈浮小便不利而渴宜用此方太陽經也膀胱腑也膀胱者溺之室也五苓散者利溺藥也膀胱者津液之府故東垣以渴為膀胱經本病然則治渴者當瀉膀胱之熱瀉膀胱之熱者利小便而已矣淡味滲泄為陽內蓄水飲須滲泄之故以三苓澤瀉為主脾土強旺則水飲不敢停留故以白朮為佐水蓄則腎燥經曰腎苦燥急食辛以潤之故用桂為嚮導之使柴胡桂枝幹薑湯柴胡桂枝黃芩乾薑牡蠣甘草栝蔞根傷寒五六日已發汗復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之已經汗下則邪當解今胸腹滿結云云則邪在半表半裡也小便不利而渴者汗下津亡內燥也若熱消津液令小便不利而渴者當嘔今渴而不嘔非裡熱也傷寒汗出則和今但頭汗他處無汗者津不足而陽虛於上也與柴胡桂枝幹薑湯以解表裡之邪復津液以助陽也柴胡加龍骨牡蠣湯柴胡半夏大黃人參桂枝茯苓龍骨黃芩鉛丹牡蠣生薑大棗八九日下之胸滿煩驚小便不利譫語一身盡重傷寒八九日邪熱已深下之而滿煩者熱未盡也驚者心惡熱而神不守也小便不利者津液不行也譫語者胃實也身重不可轉側者陽氣伏於裡不行於表也與柴胡湯以除煩悶加龍骨牡蠣丹鉛以鎮驚加茯苓以行津液利小便加大黃以滌胃熱止譫語加桂枝以行陽氣解身重而錯雜之邪靡不悉愈矣桂枝去芍藥加蜀漆龍骨牡蠣救逆湯桂枝生薑蜀漆牡蠣龍骨甘草大棗傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安此方主之傷寒脈浮責邪在表以火劫汗汗多亡陽則心神浮越故驚狂不安與桂枝以救其陽去芍藥者以其酸寒益陰非亡陽所宜也火邪錯逆加蜀漆之辛以散之陽氣亡脫加龍骨牡蠣之澀以固之所謂澀可去脫也葛根加半夏湯葛根麻黃甘草芍藥桂枝生薑半夏大棗太陽與陽明合病不下利但嘔者此方主之太陽表症與陽明裡症合同而見其邪甚於里者必自利與葛根湯以徹二陽之邪其不下利而嘔者里邪稍輕故加半夏以理逆氣外症必頭痛腰痛肌熱目痛鼻乾不眠葛根黃芩黃連湯葛根甘草黃芩黃連太陽病桂枝症反下之利下脈促表未解也喘汗宜此湯表未解者散以葛根甘草之甘里受邪者清以黃芩黃連之苦黃芩湯黃芩芍藥甘草大棗太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯太陽與少陽合病下利而頭疼胸滿或口苦咽乾或往來寒熱其脈或大而弦黃芩芍藥之苦酸以堅斂腸胃之氣甘草大棗之甘平以補養脾胃之弱黃芩加半夏生薑湯即前方加半夏生薑按半夏辛燥除濕而大和脾胃生薑辛散下氣而善理逆結故二物為嘔家聖藥也桂枝加厚朴杏仁湯桂枝芍藥生薑厚朴甘草杏仁大棗太陽病下之微喘者表未解也宜與此湯下後大喘則為裡氣大虛下後微喘則為裡氣上逆邪未傳裡猶在表也與桂枝湯以解外邪加厚朴杏仁以下逆氣乾薑附子湯乾薑附子下後復汗盡則煩躁夜而安靜不嘔不渴無表症脈沉微身無大熱下後復汗陽氣大損晝則行陽陽虛故煩躁也夜則行陰陰盛故安靜也不嘔則里無邪不渴則里無熱外無表症脈見沉微則虛寒顯著矣身無大熱者但微熱也此無根虛火遊行於外非薑附之辛溫何以復其陽乎麻黃杏仁甘草石膏湯麻黃杏仁甘草石膏汗後下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏仁甘草石膏湯仲景凡言汗後下後乃表邪悉解止餘一症而已故言不可更行桂枝湯今汗下後而喘身無大熱乃上焦餘邪未解當與麻黃杏仁甘草石膏湯以散之夫桂枝加厚朴杏仁湯乃桂枝症悉具而加喘者用之今身無大熱但汗而喘者不當以桂枝止汗但以麻黃散表杏仁石膏清裡俟表裡之邪盡徹則不治喘汗喘汗自止矣桂枝甘草湯桂枝甘草發汗過多其人叉手自冒心心下悸欲得按者此湯主之汗多亡陽則胸中氣怯故叉手冒心心悸欲得按者虛故喜按也與桂枝之辛入肺而益氣甘草之甘歸脾而緩中茯苓桂枝甘草大棗湯茯苓桂枝甘草大棗發汗後其人臍下悸者欲作奔豚此湯主之作甘瀾水法取水置大盆內以杓揚之待水珠滿面方用汗者心之液發汗後臍下悸者心虛而腎氣發動也腎之積名曰奔豚發則從少腹上至心為水來凌火以茯苓伐水邪以桂枝泄奔豚甘草大棗之甘平助胃土以平腎用甘瀾水者取其動而不已理停滯之水也厚朴半夏生薑甘草人參湯厚朴生薑人參半夏甘草太陽發汗後腹脹滿此湯主之仲景凡言發汗後者以外無表症里無別邪止有腹脹一件而已吐下後腹脹皆謂邪氣乘虛入里為實也今曰汗後是外已解也腹滿知非裡實由脾胃津液不足氣澀不通壅而為滿但與此湯和調脾胃則濁氣自降而脹自已茯苓桂枝白朮甘草湯茯苓桂枝白朮甘草吐下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振搖此湯主之吐下則裡虛故心滿氣衝及眩若脈浮緊為表邪當發汗今沉緊為里邪不可發汗若誤汗之則外動經絡損傷陽氣陽氣外虛則不能主持諸脈故身為振搖也陽不足者補之以甘茯苓白朮生津液而益陽裡氣逆者散之以辛桂枝甘草行陽分而散氣茯苓四逆湯茯苓人參附子甘草乾薑發汗若下之病仍不解而煩躁此湯主之發汗則陽氣外虛下之則陰氣內虛陰陽俱虛則生煩躁既曰陰陽俱虛獨用氣藥者蓋為氣藥有生血之功也茯苓甘草湯茯苓桂枝甘草生薑汗出不渴此方主之仲景云汗出而渴者五苓散汗出不渴者茯苓甘草湯夫渴為太陽傳本故利小便以滌熱不渴為表氣虛弱故與此湯以和衛梔子豉湯梔子香豉汗吐下後虛煩不得眠若劇者必心中懊憹梔子豉湯主之若少氣者梔子甘草豉湯若嘔者梔子生薑豉湯邪氣自表傳裡留於胸中為邪在高分則可吐也所吐之症不同如未經汗下邪鬱於膈者乃實邪也以瓜蒂散吐之若汗吐下後邪氣乘虛留於胸者乃虛煩也以梔子豉湯吐之經曰酸苦湧泄為陰湧者吐也湧吐虛煩必以梔子之苦為君清除伏熱必以香豉之寒為臣也梔子甘草豉湯症治見前方梔子甘草香豉梔子生薑豉湯症治見前方梔子生薑香豉梔子厚朴湯梔子厚朴枳實主下後心煩腹滿臥起不安梔子乾薑湯梔子乾薑醫以丸藥大下之身熱不去微煩病在上者因而越之其為吐一也而所以吐則異虛煩而兼少氣加甘草以和中虛煩而兼嘔惡加生薑以散逆腹滿而虛煩則中州之實也入枳朴以寬中大熱而微煩則中州之虛也入乾薑以理中內經曰氣有高下病有遠近症有中外治有重輕適其所以為治依而行之所謂良矣真武湯茯苓芍藥生薑白朮附子太陽發汗不解仍發熱心悸頭眩身瞤動振振欲劈地又少陰病二三日至四五日腹痛小便不利四肢沉重疼痛下利此為水氣其人或咳或小便利或下利或嘔真武北方水神也水在心下外帶表而屬陽必應辛散故治以真武湯真武生少陰之水亦治太陽之悸夫脾惡濕腹有水氣則不治脾欲緩甘以緩之則土調故以茯苓甘平為君白朮甘溫為臣經曰濕淫所勝佐以酸辛故以芍藥生薑為佐經曰寒淫所勝平以辛熱故以附子為使然水氣內清則變動多端故立加減之法咳者水寒射肺也肺氣逆則以五味子酸收之肺惡寒則以細辛乾薑辛潤之小便利則去茯苓以其滲泄也小便不利則去芍藥以其酸澀也加乾薑者散其寒也嘔者必因於氣逆附子益氣故去之生薑散氣故加之四逆湯甘草乾薑附子發熱頭痛脈反沉苦不瘥身體痛當救其里下後下利清穀身痛急當救里四肢者諸陽之本陽氣不能充布故四肢逆冷是方專主是症故名四逆也脾主四肢甘為土味是以甘草為君寒淫所勝平以辛熱是以乾薑為臣溫經回陽非純陽而健悍者無此大作用是以附子為使太陰與少陰俱受陽和之煦而真氣充周於肢節矣若發熱云云下後云云皆陰症故並主之調胃承氣湯大黃甘草芒硝太陽病未解脈陰陽俱停必先振栗汗出乃解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯陰陽俱停是陰陽和已可以弗藥而愈陽脈微者陰勝也有汗則解設或無汗大都宜溫陰脈微者陽勝也非下之何以解其亢陽乎經曰熱淫於內治以鹹寒佐以苦寒芒硝鹹寒為君大黃苦寒為臣正合此法也加甘草以緩之和之監其峻烈雖則有承順其氣之勢復有調和其胃之功矣故名調胃承氣本陽明藥而此主太陽未解也小建中湯桂枝甘草大棗芍藥生薑膠飴傷寒二三日悸而煩小建中湯陽脈澀陰脈弦腹中急痛與小建中湯二三日邪方盛又未經汗下見症不過悸而煩不審何故便行建中疑必有脫文也若陽脈澀而痛脈弦腹中掣急而痛灼然虛寒建中溫之當矣脾居四藏之中生育營衛通行津液一有不調則營衛失育津液失行此湯甘溫善為中州培養有建立之氣故曰建中脾欲緩急食甘以緩之故以膠飴甘溫為君甘草甘平為臣脈弦木旺土之仇也以桂與芍藥制之為佐益衛宜辛補營宜甘故以薑棗為使大柴胡湯柴胡半夏黃芩芍藥生薑大棗枳實大黃太陽過經反二三下之四五日柴胡症仍在先與小柴胡湯嘔不止心下急微煩者與大柴胡湯又曰十餘日熱結在裡往來寒熱與大柴胡湯夫大實大滿非駛劑不能泄當與大小承氣湯苟不至大滿大實惟熱甚而須下者必輕緩如大柴胡湯為當也清熱必以苦為主餘邪必以解為先故用柴胡之苦平解肌為君黃芩之苦寒清熱為臣芍藥佐黃芩祛營中之熱枳實佐柴胡祛衛中之熱是以為佐半夏薑棗理胃氣之逆大黃蕩滌奪土中之壅是以為使柴胡加芒硝湯柴胡黃芩甘草人參生薑半夏大棗芒硝十三日不解胸脅滿而嘔日晡潮熱已而微利此本柴胡症下之而不得利今反利者以丸藥下之非其治也潮熱者實也先宜小柴胡解外後用此湯胸脅滿嘔而潮熱邪在半表半裡小柴胡湯為的當之劑但下之失宜則里邪未盡非柴胡湯所能療也故加芒硝以蕩之桃核承氣湯桃仁大黃甘草桂枝芒硝太陽病不解熱結膀胱其人如狂血自下者愈外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜與此湯按犀角地黃湯治上血吐血衄血是也桃核承氣湯治中血蓄血中焦下利膿血是也抵當湯治下焦血如狂是也少腹急結緩以桃仁之甘下焦蓄血行以桂枝之辛熱甚搏血故加二物於調胃承氣湯中也以症狀察之當是厚桂非是桂枝也桂枝輕揚治上厚桂重降治下其為錯誤無疑也桂枝加桂湯桂枝芍藥生薑甘草大棗燒針令汗針處被寒核起而赤必發奔豚氣從少腹上衝心宜此湯奔豚者如豕突之狀為腎之積其氣在臍下築築然跳動上衝心而痛也桂枝辛熱下行大泄奔豚之要藥同桂枝湯用之則針處被寒之邪莫不畢散矣桂枝甘草龍骨牡蠣湯桂枝甘草牡蠣龍骨火逆下之因燒針煩躁此湯主之辛甘發散桂枝甘草之辛甘以發散經中之火邪澀可固脫龍骨牡蠣之咸澀以收斂正氣之浮越抵當湯水蛭虻蟲大黃桃仁太陽病身黃脈沉結小腹硬小便不利為無血小便自利其人如狂血症諦也氣不行者易散血不行者難通血蓄於下非大毒駛劑不能抵當其邪故名抵當湯經曰咸勝血去血必以咸是以水蛭鹹寒為君經曰苦走血散血必以苦是以虻蟲苦寒為臣血結則乾燥以桃仁之潤滑為佐血結則凝泣以大黃之蕩滌為使抵當丸水蛭虻蟲大黃桃仁傷寒有熱少腹滿應小便不利今反利為有血也當下之不可余藥宜抵當丸少腹滿而小便利為下焦蓄血若蓄熱者津液不行則小便不利今小便利知為蓄血蓄血堅結非輕緩之劑可療必峻猛之劑方對症耳以丸較湯僅得三分之一為稍緩也大陷胸丸大黃葶藶子芒硝杏仁甘遂白蜜病發於陽而反下之熱入因作結胸項強如柔痙狀下之則和宜進此湯病發於陽之表未傳於陰之裡但當汗解今早下之熱氣乘虛陷入於裡邪熱凝聚結於胸中項強如柔痙者邪氣甚也大黃芒硝之苦鹹善於散結葶藶杏仁之苦甘長於泄滿甘遂取其直達白蜜取其潤利皆為散結之品而葶藶尤專主胸中也大陷胸湯大黃芒硝甘遂結胸熱實脈沉而緊心下痛按之石硬但結胸無大熱為水結胸也邪在上者宜若可吐然謂之結者固結於胸中非虛煩膈實者比也上焦為高邪必陷下以平之故曰陷胸蕩平邪寇將軍之職也所以大黃為君咸能軟堅所以芒硝為臣徹上徹下破結逐水惟甘遂有焉所以為佐此惟大實者乃為合劑如挾虛或短氣或脈浮不敢輕投也小陷胸湯半夏黃連栝蔞實小結胸者按之則痛脈浮滑此湯主之大結胸者不按亦痛小結胸者必手按而後覺痛也邪輕於前故曰小陷胸夫苦以泄之辛以散之黃連栝蔞之苦寒以泄熱半夏之辛溫以散結邪自解矣文蛤散文蛤病在陽應以汗解反以冷水噀之灌之熱被卻不得去彌更益煩肉上粟起意欲飲水反不渴服文蛤散若不瘥服五苓散熱為寒閉火鬱於肺而不得泄越故彌煩也此不可以涼藥解除宜以文蛤之酸平斂而降之白散桔梗貝母巴豆寒實結胸無熱症者可與白散此方為寒結胸而設惟病甚者不得已而用之若輕者活人但以枳實理中丸與之應手取效半夏瀉心湯半夏黃芩乾薑人參甘草黃連大棗嘔而發熱柴胡症具而以他藥下之心下滿而不痛以此湯主之若加甘草去參即甘草瀉心湯治痞硬吐利若加生薑即生薑瀉心湯治痞硬噫氣辛入肺而散氣半夏乾薑之辛以散結氣苦入心而泄熱黃芩黃連之苦以瀉痞熱脾欲緩急食甘以緩之人參甘草大棗之甘以緩脾生薑瀉心湯生薑半夏甘草人參黃芩黃連乾薑大棗汗後胃中不和心下痞硬乾噫食臭心下有水氣腹中雷鳴不利胃為津液之主陽氣之根汗後外亡津液胃中空虛客氣上逆心下痞硬中焦未和不能消穀故乾噫食臭水氣腹鳴土弱不能勝水也甘草瀉心湯甘草黃芩乾薑半夏黃連大棗傷寒中風醫反下之下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩復下之其痞益甚此非結熱但胃虛氣逆故硬也此湯主之邪氣在表而反下之虛其中而邪內陷也利下穀不化腹鳴者裡虛胃弱也痞鞭嘔煩者胃虛氣逆也與瀉心湯以攻痞加炙甘草以補虛前以汗後胃虛是外傷陽氣故加生薑此以下後胃虛是內損陰氣故加甘草痞與結胸有高下之分邪結在胸中故曰陷胸邪留在心下故曰瀉心瀉心者必以苦為主是以黃連為君黃芩為臣散痞者必以辛為主是以半夏乾薑為佐陰陽不交曰痞上下不通曰滿欲通上下交陰陽者必和其中中者脾也脾不足者以甘補之故以人參甘草大棗為使以補中氣中氣安和則水升火降痞滿自消附子瀉心湯大黃黃連黃芩附子心下痞而復惡寒汗出者此湯主之心下痞者邪熱也惡寒汗出者陽虛也以三黃之苦寒清中濟陰以附子之辛熱溫經固陽寒熱互用攻補兼施並行不悖仲景之妙用也大黃黃連瀉心湯大黃黃連心下痞按之濡其脈關上浮者此湯主之濡者軟也結言胸痞言心下結言按之硬痞言按之濡結言寸脈浮關脈沉痞不言寸而但曰關上浮可以明二病之分矣經曰大熱受邪心病生焉味苦入心性寒除熱大黃黃連之苦寒以瀉心下之虛熱但以麻沸湯漬服者取其清薄而瀉虛熱也十棗湯芫花甘遂大戟太陽中風下利嘔逆表解者乃可攻之漐漐汗出發作有時頭痛痞滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也此湯主之杜壬問孫兆曰十棗湯治何病孫曰治太陽中風表解里未和杜曰何以知里未和孫曰頭痛痞滿脅痛乾嘔汗出知里未和也杜曰此但言病症而所以里未和之故總未言也孫曰某實未決願聽開論杜曰里未和者痰與燥氣壅於中焦故頭痛乾嘔短氣汗出是痰隔也非十棗湯不能治但此湯不宜輕用恐損人於倏忽也赤石脂禹餘糧湯赤石脂禹餘糧下利心下痞硬服瀉心已復以它藥下之利不止治以理中利益甚理中者理中焦此利在下焦與赤石脂禹餘糧湯復下利當利小便旋覆代赭湯旋覆花甘草人參代赭石生薑半夏大棗汗吐下後心下痞硬噫氣不除此湯主之噫氣俗名噯氣飽食息也硬則氣堅鹹味可以軟之旋覆花之咸以軟痞硬虛則氣浮重劑可以鎮之代赭石之重以鎮虛逆生薑半夏辛以散虛痞人參大棗甘以補胃弱痞而下利生薑瀉心湯痞而不下利旋覆代赭湯桂枝人參湯桂枝甘草白朮人參乾薑太陽病外症未除而數下之遂協熱而利不止心下痞硬表裡不解仲景論太陽病桂枝症醫反下之利遂不止與葛根黃連黃芩湯此又與桂枝人參湯二症俱系表不解而下之成利者何故用藥有溫涼之異乎二症雖同是內虛熱入協熱遂利但脈症不同故用藥有別耳前言脈促者表未解喘而汗出者主葛根黃連黃芩湯夫脈促為陽盛喘汗為裡熱用葛根芩連理所宜也且前症但曰下之此曰數下之前症但曰利下此曰利不止兩論細味之即有虛實之分矣瓜蒂散瓜蒂赤小豆香豉病如桂枝症頭不痛項不強寸脈微浮痞硬氣上衝咽喉不得息此胸有寒也當以瓜蒂散吐之病在上者因而越之邪客胸中至氣衝不得息非吐之不可也寒氣在胸瓜蒂之苦寒從其性而治之也赤小豆酸寒酸苦湧泄為陰也又以香豉酸苦為助則邪痰濁氣一湧而盡矣然此為快劑重亡津液與梔子豉湯大不相侔也故亡血虛家特為申禁黃連湯黃連甘草乾薑桂枝人參半夏大棗胸中有熱胃中有邪氣腹痛欲嘔吐此方主之邪氣傳裡下寒上熱夫胃中有邪則陰陽不交陰不得升而獨治於下為下寒而腹痛陽不得降而獨治於上為上熱而嘔吐上熱者泄之以苦黃連之職也下寒者散之以辛薑桂半夏之任也脾欲緩急食甘以緩之人參甘棗之用其在斯乎炙甘草湯甘草生薑人參生地桂枝麥冬阿膠麻仁大棗一名復脈湯脈結代心動悸此湯主之脈結代者血氣虛衰不能相續也心動悸者神氣煩擾不能自安也人參甘草補其氣桂枝生薑溫其氣麻仁阿膠門冬地黃皆濡潤益陰之品所以濟其枯涸而脈之結代者可復於和平矣故名復脈湯桂枝二麻黃一湯桂枝芍藥麻黃生薑杏仁甘草大棗服桂枝大汗脈洪與桂枝湯若形似瘧日再發汗出必解汗後脈洪病猶在也如瘧日再發者邪氣客於營衛之間與桂枝二麻黃一湯以散營衛之邪桂枝湯料倍於麻黃湯料者為其傷衛多而傷營少也前桂枝麻黃各半湯以不得汗故也今既已大汗出故桂枝倍麻黃耳陽明篇凡十方大承氣湯大黃厚朴枳實芒硝陽明病潮熱譫語腹滿而喘手足濈然汗者大便已硬此湯主之潮熱者陽明內實也譫語喘滿者熱聚於胃也手足汗出知大便已硬非大承氣不能療也承者順也胃為水穀之海邪氣入胃胃氣壅滯糟粕祕結必蕩滌之正氣乃順故有承氣之名也王冰曰宜下必以苦枳實苦平潰堅破結為君厚朴苦溫逐氣泄滿為臣熱淫於內治以鹹寒芒硝除熱軟堅為佐燥淫所勝以苦下之大黃蕩滌潤燥為使王海藏云厚朴去痞枳實泄滿芒硝軟堅大黃泄實惟痞滿燥實四症全具者方可用之若不宜下而誤下之變症不可勝數按承氣有三種用者大須審酌必真有大熱大實者方與大承氣湯小熱小實者可與小承氣湯若但結熱而不滿堅者僅與調胃承氣湯此為合法適宜也若病大而以小承氣攻之則邪氣不伏病小而以大承氣攻之則正氣必傷仲景曰凡欲行大承氣先與小承氣轉失氣者有燥屎也可與大承氣若不轉失氣者慎不可攻攻之則脹滿而難治又曰服承氣得利者慎勿再服何其諄諄致謹乎小承氣湯大黃厚朴枳實小熱微結此湯主之小熱微結者示亞於大熱堅結也惟其熱不大甚故去芒硝結不至於堅是以稍減枳朴也豬苓湯豬苓茯苓澤瀉滑石阿膠脈浮發熱渴欲飲水小便不利者此湯主之按浮字上應有不字詳見後釋活人云脈浮者五苓散脈沉者豬苓湯則知此湯論中脈字下脫一不字也按太陽篇內五苓散乃豬苓澤瀉茯苓三味中加桂與白朮也陽明篇內豬苓湯乃豬苓澤瀉茯苓三味中加阿膠滑石也桂與白朮味甘辛為陽主外阿膠滑石味甘寒為陰主內南陽之言可謂不失仲景之旨矣但竟以沉字易之不若不浮為妥蜜煎方用蜜微火煎凝如飴狀捻作挺內穀道中欲大便乃去汗出小便自利此津液內竭雖硬不可攻待自欲大便以此導之豬膽汁方治症同上大豬膽一枚瀉汁和醋少許灌穀道中如一食頃當大便汗出則津液枯於上小便利則津液竭於下若強攻之危症立見如上二法導之為虛弱人立權巧法也然此惟燥在直腸者宜之若燥屎在上者非其治也茵陳蒿湯茵陳蒿梔子大黃陽明病發熱但頭汗出小便不利渴飲水漿腹微滿身發黃如橘子色汗出者熱得以越但頭汗出而他處無汗且小便不利則熱不得越鬱而發黃黃如橘子色者是熱甚於外津液不行也非大寒之品不能徹其鬱熱茵陳酸苦梔子苦寒二物之性皆能導丙丁之邪屈曲下行者也黃為土之本色奪土鬱而無壅滯者大黃有專掌焉夫三物偕行而水泉湧決則發黃之症可使遄已吳茱萸湯吳茱萸人參生薑大棗食谷欲吐者屬陽明也此湯主之脾胃虛寒則不能納穀以參棗益其不足以薑茱煦其中寒當有速效若得湯反劇者屬上焦也火逆於上食不得入或小柴胡湯或黃芩湯可選用之麻仁丸麻仁芍藥枳實大黃厚朴杏仁趺陽脈浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約此丸主之趺陽者脾胃之脈浮為陽知胃氣強澀為陰知脾氣約約者約束也經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行是脾主為胃行其津液者也今胃強脾弱約束津液不得四布但輸於膀胱致令小便數水液只就州都大腑愈加燥竭大便乃祕與麻仁丸通幽潤燥梔子柏皮湯梔子甘草黃柏陽明身熱發黃此湯主之身黃者本於濕熱去濕熱之道莫過於清膀胱故投黃柏直入少陰以達膀胱之本投梔子導金水而下濟甘草入中宮調和升降剖別清濁庶幾直搗黃症之巢矣麻黃連軺赤小豆湯麻黃連軺赤小豆梓白皮杏仁大棗生薑甘草瘀熱在裡身必發黃按內經曰濕土甚而熱治以苦溫佐以甘辛以汗為故正此方之謂也又煎用潦水者亦取其水味薄不助濕氣也少陽篇凡一方小柴胡湯柴胡黃芩人參甘草生薑半夏大棗胸中煩而不嘔去半夏人參加栝蔞實渴者去半夏加人參栝蔞腹痛去黃芩加芍藥脅下痞硬去大棗加牡蠣心下悸小便不利去黃芩加茯苓不渴外有微熱去人參加桂枝溫覆取微汗咳者去人參大棗生薑加五味子乾薑主往來寒熱胸脅若滿默默不欲飲食心煩喜嘔身有微熱又曰有柴胡症者但見一症便是不必悉具邪在表者必漬形以為汗邪在裡者必蕩滌以取利邪在半表半裡者不可汗不可下但當以小柴胡湯和解而已夫邪既內傳則變不可測須迎而奪之故以柴胡之解肌理表為君黃芩之徹熱治里為臣邪初傳裡則裡氣不治故以人參扶正氣邪入於裡則氣必上逆故以半夏散逆氣生薑輔柴胡以和表甘棗輔黃芩以和里邪氣自表未斂為實乘虛而湊變症良多故立加減之法煩者熱也嘔者逆也煩而不嘔則熱雖聚而氣未逆邪氣欲漸實也去人參者恐其助熱去半夏者以無逆氣加栝蔞實者專除煩熱耳渴為津枯半夏性燥故去之人參甘潤栝蔞苦堅可以生津而止渴氣不通暢血不和調則為腹痛黃芩能滯氣故去之芍藥能和營故加之痞則氣滿甘能滿中故去大棗硬則形堅故加牡蠣悸而小便不利停水之候也去黃芩之苦堅助水加茯苓之淡滲行水不渴者里自和故去人參微熱者表未解故加桂枝咳為氣逆故去參棗之補肺欲收酸收逆氣者五味之能也乾薑辛溫快氣固主散寒亦司火逆故仲景不分寒熱每治咳症必用此二物也俗醫治傷寒不分陰陽虛實概用小柴胡湯去人參加清熱消導之藥以為常法蓋喜其不犯汗吐下溫四法凡在表在裡總無大害可以藏拙可以免怨也噫嘻每論及此不禁捧腹矣夫小柴胡為少陽經半表半裡和解之劑苟未至此經謂之引邪入室既過此經謂之守株待兔倘太陽之表熱及陽明之標熱豈此湯所能治乎若夫陰寒假熱足冷脈沉者投以此湯立致危殆矣嗟乎人命至重冥報難逃後之學者須詳審經症有是疾則用是方萬勿蹈此陋轍也太陰篇凡二方桂枝加芍藥湯桂枝芍藥甘草大棗生薑本太陽病醫反下之因爾腹滿時痛者屬太陰也此湯主之按邪氣入里則為腹痛蓋邪氣傳裡而痛者其痛不常法當下之此因太陽誤下而痛故以桂枝和衛芍藥和營中氣受調滿痛自愈桂枝加大黃湯桂枝芍藥甘草大黃大棗生薑本太陽病醫反下之腹滿而大實痛者此湯主之或問太陰病用四逆輩固所宜也然復用桂枝大黃何也大黃至寒何為用於陰經耶又何為與桂枝寒熱互用耶曰自利而渴者屬少陰為寒在下焦宜行四逆自利而不渴者屬太陰為寒在中焦宜與理中若太陽病誤下之則表邪未解乘虛陷入太陰因而滿痛且見大實脈症者當以桂枝除表邪大黃除里邪若脈無力而大便自利者大黃又在禁例矣按太陰腹滿痛其症有三如腹滿咽乾者此傳經之陽邪在法當下如吐食自利而復滿痛此直入本經之陰邪在法當溫如太陽誤下因而滿痛此乘虛內陷之邪法當以桂枝加芍藥湯和之若手不可按脈洪有力此為大實當以桂枝加大黃湯和之設使直入之陰症而脈來沉細者非二湯所宜也大抵陰邪滿痛宜與理中熱邪滿痛宜與大柴胡惟誤下滿痛宜用二湯不可不辨也少陰篇凡十四方麻黃附子細辛湯麻黃細辛附子少陰病始得之反發熱脈沉者此湯主之按太陽病發熱頭痛其脈當浮今反沉少陰脈沉法當無熱今反熱仲景於此兩症各言反者謂反常也太陽病而脈似少陰少陰脈而病似太陽所以皆謂之反而治之不同也均是脈沉發熱以其有頭痛故為太陽病陽症當脈浮今反不浮者以裡虛久寒所致又身體痛故宜救里使氣內復逼邪出外且乾薑生附亦能發汗假使里不虛寒則脈必浮而正屬太陽麻黃症矣均是脈沉發熱以其無頭疼故名少陰病陰病當不熱今反發熱則寒邪在表未傳於裡但以皮腠鬱閉為熱而在裡無熱故用麻黃細辛以發表間之熱附子以溫少陰之經假使寒邪入里則外必無熱當見吐利厥逆等症而正屬少陰四逆症矣由此觀之表邪浮淺發熱之反為輕正氣衰微脈沉之反為重此四逆湯不為不重於麻黃附子細辛湯也又可見熟附配麻黃發中有補生附配乾薑補中有發而仲景之旨微矣麻黃附子甘草湯麻黃附子甘草少陰病二三日以此湯微發汗以無表症故微發汗也按少陰症脈多沉若沉緊不可汗沉細數為在裡不可汗此症必脈沉而喘是表有寒而里無邪故以小辛之藥微微取汗按仲景發汗湯劑各分重輕如麻黃桂枝青龍越婢等湯各有差等至少陰發汗二湯雖同用麻黃附子亦有輕重之別故以加細辛為重加甘草為輕蓋辛散甘緩之義也第一症以少陰本無熱今發熱故云反也發熱為表邪當汗又兼脈沉屬陰當溫故以附子溫經麻黃髮表而熱從汗解故加細辛是汗劑之重者第二症既無裡寒可溫又無裡熱可下其所以用麻黃附子之義則是脈亦沉方可名曰少陰病身亦發熱方行發汗藥又得之二三日病尚淺比前症稍輕故不重言脈症但日微發汗所以去細辛加甘草是汗劑之輕者附子湯附子白朮茯苓芍藥人參少陰病得之一二日口中和背惡寒者當灸此湯主之背者胸中之府諸陽受氣於胸中而轉行於背內經曰背為陽腹為陰陽氣不足陰寒氣盛則背惡寒若風寒在表而惡寒者則一身盡寒矣但背惡寒者陰盛可知已或乘陰氣不足陽陷陰中表陽新虛而背微惡寒者經所謂無大熱燥渴心煩背微惡寒白虎加人參湯主之一為陰寒氣盛一為陽氣內陷蓋陰寒不耗津液故於少陰病則曰口中和也及陽氣內陷則熱耗津液故於太陽病則曰口燥舌乾而渴也故陰陽不同當以口中潤燥為辨按辛以散之附子之辛以散寒甘以緩之茯苓人參白朮之甘以補陽酸以收之芍藥之酸以扶陰大抵偏陰偏陽則為病火欲實水當平之不欲偏勝也桃花湯赤石脂乾薑粳米主少陰病二三日至四五日腹痛小便不利下利膿血二三日至四五日寒邪入里深也腹痛者裡寒也小便不利者水穀不分也下利膿血者腸胃虛弱下焦不固也澀可去脫石脂之澀以固腸胃辛以散之乾薑之辛以散裡寒甘以緩之粳米之甘以養正氣豬膚湯豬膚一斤即鮮豬皮也吳綬以為燖豬時刮下黑膚非革外厚皮之義矣少陰病下利咽痛胸滿心煩者此湯主之豬水畜也其氣先入腎少陰客熱是以豬膚解之加白蜜以潤燥除煩加白粉以益氣斷利甘草湯甘草主少陰病二三日咽痛陰邪傳於少陰為咽痛者服甘草湯如其不瘥與桔梗湯以和少陰之氣桔梗湯主治同上桔梗甘草桔梗味辛溫以散寒甘草味甘平以除熱甘梗相合以調寒熱苦酒湯半夏十四枚洗雞子一枚去黃內上苦酒主少陰病咽中傷生瘡不能語言聲不出者六經皆無咽痛惟少陰篇中有咽傷咽痛之症何也少陰之脈上貫肝鬲入肺循喉嚨故有此症古方有醋煮雞子主喉痛失音取其酸斂固所宜也獨半夏辛燥何為用之大抵少陰多寒症取其辛能發散一散一斂遂有理咽之功耶半夏散及湯半夏桂枝甘草主少陰病咽中痛凡曰少陰病者必兼脈微細乃知咽痛多是伏寒於少陰之經法當溫散此半夏桂枝之所由用也和以甘草蓋緩其熱耳若肺家實火咽痛當與山梔葶藶甘桔或刺大指端內側去爪甲角如韭葉以三稜針刺之血出即愈白通湯蔥白乾薑附子主少陰下利脈微者內經曰腎苦燥急食辛以潤之蔥白之辛以通陽氣薑附之辛以散陰寒白通加豬膽汁湯蔥白乾薑附子人尿豬膽汁少陰利不止厥逆無脈乾嘔煩脈暴出者死微續者生按白通湯及白通加豬膽汁湯真武湯與通脈四逆湯皆為少陰下利而設惟薑附相同余藥各異何也蓋少陰下利寒氣已甚非薑附不除然兼見之症不齊故用藥亦異耳如白通湯以薑附散寒蔥白通氣若嘔而煩者恐但投薑附必且拒而不納加人尿豬膽之寒待冷而服令內而不拒既已入腹冷體既消熱性便發真武湯治少陰病二三日至四五日腹滿小便不利四肢重痛自利者為有水氣故多或為之症水為寒濕腎實主之水飲停蓄為寒濕內甚四肢重痛為寒濕外甚小便不利濕甚而水穀不分也苓朮之甘以益脾逐水薑附芍藥之酸辛以溫經散濕通脈四逆湯治少陰下利清穀手足厥逆脈微為裡寒身熱不惡寒面赤為外熱此陰甚於內格陽於外與通脈四逆湯以散陰通陽其或為之症依法加減治之以上四症各有不同故其用藥因而各別也通脈四逆湯甘草附子乾薑主少陰病下利清穀裡寒外熱手足厥逆脈微欲絶反不惡寒面色赤或腹痛或乾嘔或咽痛或利止脈不出者按此湯與四逆湯同但倍用乾薑耳如面赤者加蔥九莖以通陽氣腹痛者去蔥加芍藥以和營氣嘔者加生薑以散逆氣咽痛者去芍藥加桔梗以散肺氣利止脈不出者去桔梗加人參以補肺氣脈症與方相應者乃可服四逆散甘草枳實柴胡芍藥主少陰病四逆或咳或悸或小便不利或腹痛或泄利下重者按少陰用藥有陰陽之分如陰寒而四逆者非薑附不能療也此症雖云四逆必不甚冷或指頭微溫或脈不沉微乃陰中涵陽之症此惟氣不宣通乃為逆冷故以柴胡涼表芍藥清中此本肝膽之劑而少陰用之者為水木同元也以枳實利七沖之門以甘草和三焦之氣即氣機宣通而四逆可痊已以下或為之症凡五條皆挾陽而發者也黃連阿膠湯黃連黃芩芍藥阿膠雞子黃主少陰病二三日心中煩不得臥陽有餘者以苦泄之黃連黃芩之苦以除熱也陰不足者以甘補之雞子阿膠之甘以益血也用芍藥以酸收陰氣泄去邪熱則心煩可解而臥自安矣服此不愈須加參苓歸術無不愈者厥陰篇凡六方烏梅丸烏梅細辛乾薑當歸黃連附子蜀椒桂枝人參黃柏主靜而復煩此為藏寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔此方主之肺主氣肺欲收急食酸以收之故用烏梅脾欲緩急食甘以緩之故用人參寒淫於內以辛潤之以苦堅之椒桂歸辛以潤內寒寒淫所勝平以辛熱薑附之辛熱以勝內寒用黃柏之苦以安蛔也凡治蛔勿用甘甜之物因蛔蟲得甘則動得苦則安得酸則止得辛則伏也當歸四逆湯當歸桂枝芍藥細辛甘草通草大棗主手足厥寒脈細欲絶手足厥寒者陽氣外虛不能溫於四末脈細欲絶者陰血內弱不能充於經隊桂枝細辛調衛外之陽氣當歸芍藥和營內之陰精通草宣利甘棗緩中則陰陽均受劑矣厥寒有不愈者乎當歸四逆加吳茱萸生薑湯當歸甘草通草芍藥桂枝細辛生薑大棗吳茱萸主內有久寒厥寒脈細欲絶者症雖同上但久寒之人陽氣益弱非生薑茱萸不能充溫於四末然不用四逆湯何也為手足厥寒邪猶淺也按仲景凡言四逆者乃四肢逆冷之省文也四肢者自指至肘自足至膝之謂也其邪為深凡言手足者乃自指至腕自足至踝之謂也其邪為淺仲景下字不苟須合而玩之則輕重淺深一覽瞭然矣或曰四肢厥逆或但曰四逆或但曰厥但曰逆者皆重證也或曰指頭寒或曰手足厥或曰手足逆或曰手足冷者皆輕症也麻黃升麻湯麻黃升麻當歸知母黃芩葳蕤石膏白朮乾薑芍藥天門冬桂枝茯苓甘草傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至喉咽不利吐膿血泄利不止者為難治麻黃升麻湯主之傷寒六七日邪傳厥陰之時也大下後下焦氣虛陽氣內陷寸脈遲而手足厥下部脈不至厥陰之脈貫膈循喉嚨故咽喉不利而吐膿血也此肝家雷火燥金若泄利不止又絶肺金生化之源故為難治熱氣甚者以汗發之故用麻黃升麻正氣虛者以辛潤之故用當歸薑桂肺熱者以苦泄之故入知母黃芩津竭者以甘潤之故入茯苓白朮以芍藥甘草制肝以門冬葳蕤潤肺更以石膏清胃勿使東方之邪犯中氣也乾薑黃芩黃連人參湯乾薑黃芩黃連人參傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐此湯主之上焦寒則吐下焦寒則利為醫所傷逐成寒格以乾薑散寒人參補氣此正治也其用芩連者寒因寒用為嚮導之兵此從治也白頭翁湯白頭翁黃連黃柏秦皮熱利下重者下利欲飲水者以有熱故也均以此湯主之自利不渴為藏寒與四逆以溫中下利飲水為有熱與此湯以消里按少陰自利而渴乃下焦虛寒而用四逆者恐不可以渴不渴分寒熱也正當以小便黃白別之耳內經曰腎欲堅急食苦以堅之利則下焦虛是以純苦之劑堅之霍亂篇凡三方四逆加人參湯人參乾薑甘草附子主惡寒脈微而復利利止亡血也此湯主之惡寒脈微而利是陽虛陰勝也利止而津液內竭故曰亡血金匱玉函曰水竭則無血與四逆以溫經助陽加人參以生津益血理中湯人參甘草白朮乾薑主霍亂寒多不用水者按仲景法發熱頭痛身疼惡寒吐利者此名霍亂熱多飲水者五苓散主之寒多不飲水者此方主之凡吐利以無寒熱不頭痛為陰以有寒熱頭痛為陽更以飲水不飲水辨之百不失也中州陸沉吐利交作其象為亂故名霍亂湯名理中理者治也治其亂而敉寧之也白朮甘草自是脾家要劑乾薑祛太陰之寒無他藥可代者寒則必本於虛故以人參益氣寒甚者加附子其功更大若審症明確而投之神效捷於桴鼓通脈四逆加豬膽汁湯照原方加豬膽汁湯合服主吐已下斷汗出而厥四肢拘急不解按仲景法既吐且利小便復利大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之若吐已而下亦斷但汗出而厥四肢拘急脈微欲絶者此湯主之夫吐下雖止津液已亡況加汗出則津液益枯中寒轉甚故筋脈攣急非四逆溫經何以救乎加豬膽者用為引經之助恐人參亦必不可缺也陰陽易差後勞復篇凡四方燒裩散取婦人中裩近隱處剪燒灰以水和服方寸匕日三服小便即利陰頭微腫則愈婦人病取男子裩襠燒灰主陰陽易病身重少氣少腹裡急引陰中拘攣熱上衝頭重眼花膝脛拘急者按陰陽易者女子病未全愈因於交接男子反得病者名曰陰易病得之淫欲非藥石所能療惟裩襠近隱則氣之所熏襲者仍以治交媾之恙而經所謂竹破須將竹補宜之意枳實梔子豉湯枳實梔子豉大病瘥後勞復此湯主之有宿食者加大黃少許按大病之後無有不虛況因勞而復則虛而且傷矣古人以一味人參助正多煎頓服而愈豫屢試而屢驗者此方寒涼峻伐惟稟壯而脈有力者宜之若脈虛神倦者而誤投之能無犯虛虛之戒耶牡蠣澤瀉散牡蠣澤瀉蜀漆栝蔞根葶藶子商陸根海藻主大病瘥後腰以下有水氣者大病瘥後脾胃氣虛不能制水歸於隊道故下焦發腫法當潔淨府牡蠣澤瀉海藻之咸以泄水氣蜀漆葶藶栝蔞商陸之酸辛以導腫濕竹葉石膏湯竹葉石膏半夏人參甘草粳米麥門冬主傷寒解後虛羸少氣氣逆欲吐者宜與此湯竹葉石膏甘草之甘辛以發散餘熱麥冬人參粳米之甘平以培益真元半夏辛平善散氣逆而止吐雜方凡五十六方百合知母湯百合知母主百合病汗後者滑石代赭湯百合滑石代赭石主百合病下後者百合雞子湯百合雞子黃主百合病吐後者百合地黃湯百合生地黃汁主百合病不經汗吐下者栝蔞牡蠣散栝蔞根牡蠣主百合病變發渴者百合滑石散百合滑石主百合病變發熱者按以上百合病凡六方俱不外乎百合夫百合之性以寧心潤肺補中祛邪為功者也且觀其佐使諸藥皆屬清涼之品乃知百合病者本於君主不寧因而熏灼相傳百合為之調劑於其間則炎者息而燥者潤君臣道合而百脈交和命曰百合不亦名實相副者乎雄黃熏法雄黃為末筒瓦二枚合之燒向肛熏之另以苦參煎湯洗之主惑病蟲蝕肛者赤豆當歸散赤豆當歸主三四日目赤七八日眥黑若能食者膿已成也升麻鱉甲湯如治陰毒去雄黃蜀椒升麻當歸蜀椒甘草雄黃鱉甲主陽毒面如錦紋咽喉痛吐膿血觀其陰陽二毒並用一方已可異矣及陽毒宜行涼劑反用雄黃蜀椒溫熱之藥陰毒宜行溫劑反去雄黃蜀椒溫熱之藥則知此症感天地惡毒之異氣非傷寒余疾昭然可見乃後賢不察卻以大寒治陽毒以大熱治陰毒於仲景之旨不啻徑庭矣又考此六味莫非解毒之品即當歸一味亦導引諸解毒藥敷布於遍體者也九味羌活湯羌活防風蒼朮白芷川芎生地黃芩細辛甘草一名沖和湯主天令溫熱之候用此方以發散風寒按陶節庵用此方於春夏秋三時發散傷寒以代桂枝麻黃湯用雖然亦不可太泥也如天令尚寒麻黃桂枝仍不可缺如非盛夏黃芩生地亦勿輕投倘挾暑邪必入香薷扁豆倘遇嘔吐必入半夏藿香氣弱脈虛可進人參足冷脈沉因腎虛房勞復感寒邪則當溫經散寒此方即在禁例矣雖當熱令而其人無血虛煩熱者芩地亦不敢肆用也芎蘇散紫蘇乾葛柴胡蒼朮川芎枳殼陳皮桔梗半夏茯苓甘草主春夏秋三時感寒頭痛發熱惡寒脈浮緊無汗按紫蘇解太陽之邪乾葛解陽明之邪柴胡解少陽之邪蒼朮川芎為助汗之需枳殼陳皮為達氣之用半夏茯苓有行津之力桔梗甘草有和調之功天地之道陰陽和而云雨作人身之道陰陽和而津液通故經曰陽之汗以天地之雨名之可謂知類也夫藿香正氣散紫蘇藿香大腹皮白芷茯苓蒼朮厚朴陳皮桔梗半夏甘草主傷寒頭痛寒熱霍亂吐瀉山嵐瘴氣或感濕氣按風濕為外感紫蘇白芷辛以散之吐瀉為內傷平胃藿香大腹半夏苦以泄之茯苓去濕甘草和中桔梗則表裡並需夫邪氣既散則正氣得申故名正氣散不換金正氣散半夏藿香蒼朮厚朴陳皮甘草主時行瘟疫及山嵐瘴氣霍亂吐瀉及出遠方不伏水土等症按平胃散本表裡雙解之劑又加之以藿香溫胃氣半夏除痰濕中州受調和之益則外來無侵犯之邪遠遊者誠當寶重故名不換金大羌活湯防風羌活獨活防己黃芩黃連蒼朮白朮甘草細辛知母川芎生地治兩感傷寒臟腑俱病按內經及仲景皆以兩感為必死之症為表裡不可並攻陰陽難同一法也東垣以為稟有虛實感有淺深虛而感之深者必死實而感之淺者或生故立此方以羌獨防風蒼朮細辛川芎理其表邪芩連知地白朮甘草治其里邪以此治之屢有生者雄黃丸雄黃當歸蘆薈麝香檳榔主狐惑微煩默默欲臥毒上攻咽蟲蝕聲嗄兼下蝕濕慝或便膿血雄黃鋭散雄黃苦參青葙子黃連桃仁主下部𧈟瘡升麻葛根湯升麻葛根白芍藥甘草去癍疹欲出未出以此湯升發之已出者不可用也按癍者陽明經壅積之熱毒也故以升麻葛根發之芍藥同甘草安和脾胃通達血脈故能贊相升麻葛根以宣送癍毒昧者不知其故乃畏其酸斂輒以意削去之使此湯大減功力嗟乎豈古人心智不如今人至此乎三因加味羌活散羌活獨活柴胡前胡枳殼桔梗茯苓川芎升麻白芍藥甘草生薑主癍疹初出身痛頭痛憎寒壯熱胸中不利按癍為陽明之症升麻葛根湯乃確劑也茲以身痛故加二活以寒熱故加二胡以胸中不利故加枳桔後來復立加減諸法蓋確乎其不可易矣犀角玄參湯犀角屑黑玄參升麻射干黃芩甘草主發癍毒盛心煩狂言或咽痛者心煩狂言南方之火亢炎也咽喉作痛者北方之水衰微也水虛不能制火火旺必來乘金金燥乃為咽痛理勢之固然者也以犀角瀉南玄參補北射干黃芩救西方之燥金甘草和中化毒狂煩等症靡不悉愈矣大青四物湯大青阿膠甘草淡豆豉主解毒化癍雷藏澤中雷起而火隨之龍潛海底龍起而火隨之龍雷之火燔灼熏逼陽明毒邪熾盛故以大青制甲乙之雷火以阿膠制壬癸之龍火甘草解其遺毒豆豉徹其餘邪震木霽威坎水歸元水火有既濟之功肌體無炎蒸之苦矣當歸丸當歸甘草黃連大黃主發癍內實大便不通者黃連解毒湯黃連黃芩黃柏梔子主發癍熱甚心煩不得眠中州熱不得越則肌肉斑爛脾主肌肉故也是方以黃連瀉丙丁以黃芩瀉庚辛以黃柏瀉壬癸以梔子瀉甲乙而戊己之藥何以反不及乎蓋土位居中而寄旺於四時之末四職咸致清寧中宮默享和平不煩更為調劑耳人參三白湯人參白朮白茯苓白芍藥生薑大棗治陰症發癍亦出胸背手足之間但稀少而淡紅或為涼藥太過大凡元氣素虛或因房室損腎或因內傷生冷或因寒藥太過遂成陰症寒伏於下逼其無根失守之火上犯金宮傳於皮膚而發斑點但如墳蚋蚤痕非大紅點也以參芩白朮培植真氣以白芍大棗滋育元陰皆養正之道也然寒淫所勝治以辛熱非附子之健悍乾薑之理中何以扶陽返本而回元氣於無何有之鄉乎黃耆建中湯黃耆芍藥桂枝膠飴甘草主汗多亡陽尺脈虛弱者按汗者心之液也若不可汗而誤汗與可汗而過汗則丙丁之真陽幾於消亡矣陽氣者所以衛外而為固者也故以黃耆補表間之陽氣芍藥收表間之散氣桂枝固衛而實腠膠飴補中以壯肌譬諸牆垣密固中宮無遺失之虞則向之頽廢者今且復為建立矣犀角地黃湯芍藥生地丹皮犀角屑主傷寒應汗失汗內有瘀血鼻衄吐血面黃大便黑此方消化瘀血按去瘀之劑抵當湯丸最緊桃仁承氣湯次之犀角地黃湯又次之緊者主下焦次者主中焦緩者主上焦此方行中有補血家中和之品也丁香柿蒂散丁香柿蒂茴香乾薑良薑陳皮主胸中虛寒厄逆不止者按火炎者固氣逆上衝而寒凝者氣滯不行亦逆上而為逆也取二香開上焦之結取二薑溫中土之經陳皮有徹上徹下之功能柿蒂有引經從治之力用俾寒谷陽回而逆轉為順矣乳香硫黃散乳香硫黃艾葉主陰寒厄逆用此劫之按硫黃為益火之精陰寒所喜乳香為宣氣之主壅滯所宜又藉艾葉之芬芳則經絡隊道無微不達且鼻通乎天嗅之則干金得職而陰翳之邪陡避三舍矣茵陳四逆湯附子茵陳乾薑主陰黃厥冷脈沉遲腰以下自汗茵陳理中湯茵陳白朮乾薑人參主陰黃腹痛自利或因內傷寒發黃按以上二方總為陰黃而設但四逆主少陰之寒故理腰下自汗理中主太陰之寒故除自利腹疼毫釐千里非具眼者莫能辨也霹靂散附子一枚炮細茶三錢主陰盛隔陽身熱面赤煩躁不能飲水脈沉細或伏絶少火生氣安於下者也壯火食氣亢於上者也火將滅而復明為陰盛隔陽之象內經所謂重寒則熱者是也當是之時僅存一線之氣汲汲乎殆哉桂薑之力猶為淺鮮惟附子一物獨行功力最大誠堪起死名之以霹靂者為雷霆之用在乎春夏一喻其陽和之敷布一喻其力用之弘大也按陰盛隔陽之症九死一生非大溫大補則百無一生醫者憂讒病家愚昧畏附子而不投則坐而待斃者比比皆是也參胡三白湯人參柴胡白茯苓白朮白芍藥主過經不解人弱脈虛按病久而餘邪未解蓋正氣虛而邪不能伏也以人參三白補其正氣以柴胡一味徹其餘邪此養正則邪自除遵乎末法之治者也連翹敗毒散連翹梔子羌活玄參薄荷防風柴胡桔梗升麻川芎當歸芍藥黃芩牛蒡子主發頤耳後或耳下腫硬宜速消之緩則成膿矣消毒圍藥黃連黃芩黃柏大黃梔子雄黃白芨白蘞芙蓉葉大薊根赤豆南星歸尾朴硝五倍子半夏上為細末用五葉藤腦見腫消草野苧麻根三件搗汁入苦酒少許調勻敷之留頭出毒托裡消毒散黃耆白芷連翹羌活川芎歸尾赤芍藥防風桔梗柴胡皂角刺金銀花甘草節主發頤有膿不消已破未破俱可服按足少陽之脈從耳後入耳中故發頤一症其邪在膽膽為半表半裡之經不可汗不可下不可吐若誤行汗吐下者邪伏本經多為發頤當其未成也以涼藥消之以風藥散之連翹敗毒散是也及其已成也以補劑托之以升劑提之托裡消毒散是也將潰未潰之際既恐其蔓衍又恐其難潰故以解毒消腫之劑防間之消毒圍藥是也先後緩急之序大須審詳不得草草猳鼠糞湯韭白根一握兩頭尖十四粒主陰陽易及女勞復調燒裩散尤妙栝蔞竹皮湯栝蔞根青竹皮主陰陽易熱氣上衝胸中煩悶手足攣蜷及搐搦按陰陽易及女勞復所傷俱在腎韭白有助陽之功猳鼠為子水之獸水不足者熱必上衝熱積生風故為攣搐栝蔞多涼肺之功竹青具清心之德熱既清而風亦化古人用藥豈漫然者哉普濟消毒飲柴胡黃連黃芩玄參甘草桔梗連翹牛蒡子升麻白芷殭蠶馬屁勃板藍根如無以大青或青黛代之主時行大頭瘟疫按大頭瘟疫宜審察運氣分別六經而為施治普濟消毒飲不過為主方耳往往此毒先腫於鼻次腫於耳從耳至頭上絡腦後結塊則止不散必成膿也此方以涼劑降濁以風劑升清又佐以解毒諸品誠為良法葳蕤湯葳蕤石膏葛根杏仁川芎麻黃羌活白薇青木香主風溫病在少陰厥陰者按先傷於風復傷於熱風熱相搏乃為風溫故以麻黃葛根羌活川芎祛在表之風葳蕤石膏杏仁白薇祛在表之熱大抵風症多本於厥陰風木之經故以青木香暢東方之氣則風熱易解耳知母葛根湯乾葛知母石膏羌活人參防風杏仁川芎葳蕤甘草升麻南星木香麻仁主發汗後身猶發熱按邪從汗解則灼熱當除今既得汗而熱猶如故是藥淺而病深也仍以羌活葛根升麻防風理其表石膏知母川芎杏仁解其肌風熱日深風痰必聚故以南星木香滌其痰已經發汗中氣必虛故以人參葳蕤養其正和之以甘草潤之以麻仁而風熱相搏之症自當雙解矣紫雪升麻黃金凝水石石膏犀角羚羊角玄參沉香木香丁香甘草主發班又主暑中三陽大熱煩躁發渴一切熱症按紫雪乃陽明經藥也以升麻清陽明之標熱以石膏清陽明之本熱凝水玄參壯水以制火犀角羚羊抑火以消金三香性溫一取其入熱分為嚮導之兵使無拒格之患一取其宣氣分為下降之用使無炎逆之愆黃金重墜可以鎮定南方甘草和平可以調和中氣水強則熱自化氣降則火自清陽明蘊蓄之邪肌表灼燔之苦不期其愈而自愈也蔥尉法蔥白一握如臂大主陰症厥逆沉昏以索纏縛切去根及青約厚二寸先於火上烘熱著病人臍上更以尉斗貯火尉之令熱氣透入別作三四餅壞則易之良久病人當漸蘇汗出手足溫續以四逆湯溫之若尉而手足不溫不可治也灼艾法氣海穴在臍下一寸五分丹田穴在臍下二寸關元穴在臍下三寸主陰症面如刀刮四逆爪甲青黑身體如冰上以艾炷灸五十壯甚者灸二百壯以手足漸溫人事稍省為可治也結胸灸法黃連巴豆上二味和勻捏作餅子裝臍中以艾炷如龍眼核大灸之輕者一炷重者不過二三炷熱氣透入腹中作聲泄下惡物立愈蒸汗法主服藥不得汗故天寒汗不得出宜行此法以薪火燒地良久令極熱掃去灰以沸湯灑之取蠶沙柏葉桃葉粳麩鋪於燒熱地上可側手厚鋪席於上令病人臥之更溫覆之移時汗出俟周身至腳心熱乃用溫粉撲之南史載範云病傷寒恐不得與武帝九錫之慶召徐文伯診視以實告之曰可得便愈乎文伯曰便愈甚易但恐二年後不復起耳云曰朝聞道夕死猶可況二年乎文伯乃以是法取汗翼日果愈後二年果卒取汗先期尚促壽限況不顧表裡不待時日便欲速效乎水薄法疊布數重新汲水漬之稍捩去水搭於患人胸上須臾布溫又以別漬冷布易之頻換新水熱勢稍減續以寒劑清之主陽症大熱或狂煩昏亂搐鼻法取瓜蒂為末口中噙水搐一字入鼻孔出黃水即愈更以薑渣茵陳擦之黃色即減主濕家發黃頭痛等症劫嘔吐法藥中加自然薑汁及炒焦粳米少許隨用竹管重納內關其嘔即止惟胃實者忌粳米灸期門法期門穴婦人屈乳頭向下盡處骨間動脈是也男子乳小者以手一指為率陷中動脈是穴男左女右灸三五壯主陰寒厄逆吐痰法先用皂莢麝香細辛生明礬為細末調薑汁灌然後以鵝毛醮桐油皂莢末入喉中探吐痰出乃愈如咯血不出身熱喘急滿悶喉中漉漉有聲此名肺家獨喘為不可治薑渣尉法一切寒結水結食結痞結血結痰結支結俱用生薑四五斤搗爛如泥略捩去汁取渣炒熱綃帛松包操按心腹豁然自愈如冷別以熱者易之以愈為度惟熱結者用冷薑渣揉按切忌炒熱主一切停滯結胸等症蒸臍法麝香半夏皂莢等分為末填入臍中更用生薑切片如二文錢厚鋪於臍上以大艾炷於薑片上灸二七壯熱氣達於內逼寒出於外候手足溫暖即止然後投薑附等藥主陰症吐利厥逆昏沉心下脹硬如冰湯藥不受唇面指甲皆青黑脈沉欲絶闢瘟疫方雄黃赤小豆丹參鬼箭羽上為細末煉蜜為丸如梧桐子大每日空心以溫水下五丸雖與病人同床亦不相染治一切時行疫症不相傳染治時疫不染諸方以水飛雄黃男左女右吹鼻孔中或透明雄黃一塊重五錢絹包系頭頂心妙取貫仲浸水飲之以赤小豆同糯米浸水缸中每日取水用之問因察症正名總論夫傷寒者病勢險重症緒繁多若非問因察症正名未有不誤者也凡至病家未診先問最為要法或得之脫衣卸被或得之勞力辛苦或得之房勞太過或得之飢餓或得之飽食或為素虛或為素實或素有別症或數無別症此問因之法也六經形症各當審詳太陽病發熱惡寒頭項俱痛腰脊俱強噁心拘急體痛骨疼則是太陽表症為標病也若內熱煩渴小便不利則是太陽里症為本病也其脈浮緊有力為傷寒浮緩無力為傷風脈安靜為不傳脈躁盛為欲傳也陽明病身熱微惡寒頭額目痛鼻乾不眠則是陽明表症為標病也若煩渴欲飲汗出惡熱則是陽明裡症為本病也若潮熱自汗譫渴硬滿斑黃狂祕則是正陽明胃實為腑病也其脈微洪為標洪數為本沉數為實也少陽病頭角痛而目眩胸脅痛而耳聾寒熱嘔而口苦則是少陽經病也其經為半表半裡其脈為且弦且數太陽病壯熱咽乾或自利不渴則是陽經熱邪傳入太陰為標病也若燥渴發黃尿赤便祕則是太陰本病也若初病起無頭疼渴熱便寒冷滿痛吐利嘔厄則是太陰直中本病也若初病不熱但脹滿噯痛則是生冷內傷也其脈沉緩為標沉實為本直中與內傷寒皆沉細也少陰病舌乾口燥譫渴便祕則是陽經熱邪傳入少陰為標病也若身熱面赤足冷脈沉則是腎經夾陰傷寒標本俱病也陰躁欲坐泥水井中雖欲飲而不受面赤足冷脈沈則是陰極發躁為本病也若面赤足冷煩躁欲飲揭去衣被脈數大無力則是虛陽伏陰標與本病也若初病起無頭疼熱渴便厥冷蜷臥臍腹俱痛吐瀉戰栗則是腎經直中本病也更兼小腹絞痛或吐利甚則舌卷囊縮則是夾陰中寒亦本病也其脈沉實有力為陽邪標病沉細無力為直中寒症數大無力為虛陽伏陰脈沉為夾陰傷寒也厥陰病寒熱如瘧則是陽邪傳入厥陰為標病也若舌卷囊縮煩滿祕渴手足乍溫乍冷則是陽邪傳入厥陰為本病也若初病起無頭疼熱渴便怕寒厥冷腹陰俱痛吐沫泄利舌卷囊縮則是厥陰直中本病也其脈浮緩為標沉實為本細軟為直中也頭疼拘急身熱惡寒腹痛嘔吐氣口與人迎俱盛則為夾食傷寒身熱惡寒頭疼微汗神倦懶言則為勞力傷寒身熱惡寒隱隱頭痛喘咳煩悶左脈緊盛右脈洪滑則為夾痰傷寒身熱惡寒頭脅俱痛氣鬱不舒則為夾氣傷寒胸脅腹痛痛定不移頭痛煩渴身熱惡寒則為血鬱傷寒更有傷暑傷濕溫病熱病冬溫風溫溫毒溫瘧風濕濕溫疫病痙病咸須辨之確而正其名因其名而施其治然後萬舉萬當耳在表者汗之散之在裡者利之下之在半表半裡者和解之在上者因而越之下陷者升而舉之夾陰者補之直中者溫之其於表裡陰陽虛實寒熱標本如別黑白絶無眩惑症有變遷治無膠執輕重緩急用之不忒可謂知醫而不愧操司命之權矣
