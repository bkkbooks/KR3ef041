body:
  text: 卷上傷寒總論冬令嚴寒萬類閉藏君子固密則不傷於寒觸犯其邪名曰傷寒夫四時之氣皆能為病而傷寒獨甚者以其殺厲之氣也冬月感而即病者為正傷寒冬不即病寒邪藏於肌膚至春而發名為溫病至夏而發名為熱病獨不言至秋為涼病者何也寒水之氣與火為仇遇仇不發已為火勝而長夏濕土又制水邪況逢金令金得寒而愈堅故秋月無傷寒也秋病之似傷寒者皆夏月納涼之邪或時行不正之氣或秋令涼氣之邪耳仲景方法為冬月即病之正傷寒設也後世混將冬月傷寒之方通治春夏溫熱之病遺禍至今未有能改陶節庵以麻黃桂枝難以輕投竟以沖和代之施於時疫之病猶或可也用於傷寒之症不亦悖乎深嗟今之治傷寒者在一二日不問屬虛屬實便汗之在三四日不問在經在腑便和之在五六日不問在表在裡便下之投劑一瘥幽泉沉冤矣人之表裡虛實不同邪之傳變異氣各別奈何拘於日數不審形證耶且寒邪傷人原無定體或自太陽始日傳一經六日傳至厥陰而愈者或不罷而留滯一經者或間經而傳者或但傳二三經而止者或始終只在一經者或越經而傳者或陽經一齊合病者或陽經後先並病者或初入太陽不作鬱熱便入少陰而成陰症者或直中陰經而為真寒者或傷生冷而為內傷寒者必審脈驗症辨名定經確然無疑然後投劑日數雖多但見表症脈浮者猶宜汗之日數雖少但見里症脈沉者即當下之若表裡症俱見或表裡症俱無此屬半表半裡禁汗禁下禁吐但當和之若日久不愈脈虛神困者便當補之果能辨陰陽審表裡察虛實譬之善射莫不中的矣腎虛人易犯傷寒論腎屬寒水主令在冬故內經以為閉蟄封藏之本以欲耗其精則不能奉若天時封藏固密遂致太陽疏滲寒邪易侵若腎臟堅固即使迫於寒滅受邪輕淺治之即痊腎臟虛衰略冒寒邪便爾深重醫藥難療故曰傷寒偏死腎虛人良非虛語不服藥為中醫論傷寒傳變淆訛症端錯雜且肅殺之氣最為毒烈醫者不能博古衡今漫投湯劑鮮不夭枉致令憤激之説以不服藥為中醫豈其然哉惟正氣實而邪氣輕者或可俟其經盡而愈若正氣虛而邪氣重者非按法施治何由得痊譬如人溺洪濤命在呼吸不為援手而聽其自渡恐全活者幾希矣兩感論一曰太陽受之即與少陰俱病則頭痛太陽口乾煩滿而渴少陰二日陽明受之即與太陰俱病則身熱譫語陽明腹滿不欲食太陰三日少陽受之即與厥陰俱病則耳聾少陽囊縮而厥厥陰病至六日腑臟之氣俱盡營衛之氣俱絶則死矣仲景既論兩感為必死之症而復日治有先後者蓋不忍坐視而覬其萬一之活也如下利身痛則先救里不利身痛則先救表表症多者發表為急里症多者攻裡為先東垣曰虛而感之深者必死實而感之淺者或生用大羌活湯十救一二時行疫症春應暖而反寒夏應熱而反涼秋應涼而反熱冬應寒而反溫非其時而有其氣觸冒之者沿門遍戶長幼相似此時行疫症也春感寒邪升麻葛根湯夏感涼邪調中湯秋感熱邪蒼朮白虎湯冬感溫邪葳蕤湯表不愈者芎蘇散里不愈者調胃承氣湯或成大頭瘟者當辨其經先於鼻額紅腫以致面目腫盛陽明也壯熱氣喘口乾咽痛脈數而大普濟消毒飲耳旁及頭角紅腫少陽也往來寒熱潮熱口苦咽乾目痛脅痛小柴胡湯加花粉芩翹發於項上及腦後項下目後赤腫者太陽也荊芥敗毒散三陽俱受邪普濟消毒飲不可峻攻恐邪氣內陷也虛人兼扶正氣便結者微下之傷寒十六症傷寒者寒傷營血脈浮而緊頭痛發熱無汗惡寒傷風者風傷衛氣脈浮而緩頭痛發熱有汗惡風傷寒見風者既傷於寒復感風邪惡寒不躁其脈浮緩傷風見寒者既傷於風復感寒邪惡風煩躁其脈浮緊以上四症皆冬月即病者溫病者冬受寒邪交春乃發發熱頭痛不惡寒而渴脈浮數溫瘧者冬受寒邪復感春寒脈陰陽俱盛症寒熱往來風溫者冬受寒邪復感春風頭痛身熱自汗身重默默欲眠語澀鼻鼾四肢不收尺寸俱浮又發汗後身猶灼熱者亦名風溫溫疫者冬受寒邪復感春溫時行之氣溫毒者冬受寒邪春有非時之熱復感其邪或有發癍者以上五症冬傷於寒病發於春故皆有溫之名也熱病者冬傷於寒至夏乃發頭疼身熱惡寒其脈洪盛傷暑者暑熱為邪自汗煩渴身熱脈虛傷濕者感受濕邪身重而痛自汗微熱兩足逆冷四肢沉重胸腹滿悶風濕者既受濕氣復感風邪肢體重痛額汗脈浮痙者身熱足寒頭項強急面紅目赤口噤頭搖角弓反張若先受風邪復感於寒無汗惡寒為剛痙先受風邪復感於濕惡風有汗為柔痙仰面而臥開口為陽合面而臥閉目為陰浮緊口渴屬陽沉細口和屬陰類傷寒六症一曰痰症停痰留飲自汗胸滿發寒熱但頭不痛項不強與傷寒異二曰食積胸腹滿悶發熱頭痛但身不痛氣口脈盛與傷寒異三曰虛煩氣血俱虛煩躁發熱但身不痛頭不痛不惡寒不浮緊與傷寒異四曰腳氣足受寒濕頭痛身熱肢節作痛便閉嘔逆但腳腫痛或枯細與傷寒異五曰瘀血跌觸損傷胸脅腹痛手不可近但頭不痛脈不浮緊與傷寒異六曰內癰發熱惡寒胸痛而咳濁唾腥臭右寸數大為肺癰小腹重痛便數如淋皮膚甲錯腹皮腫急脈滑而數為腸癰胃脘大痛人迎脈盛胃脘癰也但無頭痛項強與傷寒異內傷外感辨內傷外感頗相疑混誤治必死極當詳辨外感則人迎大於氣口內傷則氣口大於人迎外感則寒熱齊作而無間內傷則寒熱間作而不齊外感惡寒雖近烈火不除內傷惡寒得就溫暖即解外感惡風乃惡一切風寒內傷惡風惟惡些小賊風外感症顯在鼻故鼻塞不利而壅盛有力內傷症顯在口故口不知味而腹中不和外感邪氣有餘故發言壯厲先輕而後重內傷元氣不足故出言懶怯先重而後輕外感頭痛常常而痛內傷頭痛時作時止外感手背熱手心不熱內傷手心熱手背不熱若內外相兼而病者尤當細辨以內症多者是內傷重於外感補養為先外症多者是外感重於內傷解散為急此東垣未發之旨也治傷寒宜早仲景曰傷寒初起即時求治凡作湯藥不避晨夜醫之稍遲病即傳變必難為力矣凡作汗藥雖言一日三服若病劇者半日中可盡三服一日一夜當時時觀之如救焚拯溺不容少怠視傷寒宜詳凡看傷寒自頂至踵最宜詳察一有不到錯誤匪輕仲景云觀今之醫各承家技始終順舊省疾問病務在口給相對斯須便處湯劑按寸不及尺握手不及足人迎趺陽三部不參動數發息不滿五十明堂闕庭盡不見察夫欲視死別生實為難矣嗟乎業已稱醫人之司命孟浪至此烏乎可哉辨成氏再傳之訛傷寒傳經自表入里由淺漸深故六經以次受之六經傳盡無出而再傳之理也太陽為三陽最在於外陽明為二陽在太陽內少陽為一陽在陽明內此三陽為表也太陰為三陰在少陽內少陰為二陰在太陰內厥陰為一陰在少陰內此三陰為里也皆由內以數至外故一二三之次第如此一二日始於太陽二三日傳於陽明三四日少陽四五日太陰五六日少陰六七日厥陰此論其常耳若論其變或間經或越經或始終一經不可以次第拘不可以日數限也大抵傳至厥陰為傳經已盡不復再傳矣乃成氏云六日厥陰為傳經盡七日當愈七日不愈者再自太陽傳至十二日復至厥陰為傳經盡十三日當愈十三日不愈者謂之過經其説謬矣善哉馬仲化曰自太陽以至厥陰猶人從戶外而升堂而入室也厥陰復出而傳於太陽奈有少陰太陰少陽陽明以隔之豈有遽出而傳太陽之理乎仲景太陽篇云太陽病頭痛七日以上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈此言始終只在太陽一經者也故太陽篇曰發於陽者七日愈陽數七故也若七日不愈欲再傳陽明矣當針足陽明迎而奪之也試玩行其經盡不曰傳其經盡則仲景之意顯然矣成氏誤認行其經盡為傳遍六經乃有自太陽再傳之説耳或問曰霍亂篇云十三日愈者經盡故也此非六日傳遍六經後六日再傳經盡十三日當愈者歟仲景云十三日不解過經譫語者當下之此非十二日傳盡十三日不愈為過經者歟答曰經盡者行其經盡之謂也如太陽受病於一日至七日為行太陽經盡之例推之則諸經皆可屈指而期矣陽明受病於二日至八日自愈者行陽明經盡也少陽受病於三日至九日自愈者行少陽經盡也四五六日至三陰經次第至十二日愈者行厥陰經盡也十三日大氣皆去精神爽慧之期故曰過十三日以上不間尺寸陷者大危何嘗有再傳經盡謂之過經之旨哉詳考仲景所謂過經或言過太陽經成里症者或泛言過經者陽明篇曰汗出譫語燥屎在胃此為風也過經乃可下之謂燥屎在胃而譫語風邪在表而汗出須過太陽經無表症乃可下之此言過太陽經成里症者也果如成氏十三日再傳經盡謂之過經則燥屎在胃必待十三日乃下乎於此條則注曰過太陽經無表症乃可下之則自相矛盾矣霍亂篇曰下利後當便鞕音硬硬則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也此泛言過經者也何嘗有再傳經盡謂之過經之旨哉蘊要祖成氏之説其過經不解例曰經言十三日不解謂之過經仲景實無此語誤以成注為經矣千古承訛後學聾瞽故表而出之六經七日病愈論六經以次受病其愈皆以七日為期王叔和曰其不兩感於寒更不傳經不加異氣者至七日太陽病衰頭痛少愈八日陽明病衰身熱小歇九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去精神爽慧也此論本於素問從來注疏不能無誤請更疏之不兩感者非表裡雙傳也更不傳經者邪在此經更不傳彼經也不加異氣者不復感寒感風感溫感熱感濕而變為他病也如是則可以期六經病愈之日矣太陽篇曰發於陽者七日愈以是計之乃知六經之病自一日受者七日當衰二日受者八日當衰故七日邪在太陽不傳陽明更無變症則至七日太陽病衰頭痛少愈二日傳陽明更不傳變至八日陽明病衰身熱少歇三日傳少陽更不傳變至九日少陽病衰耳聾微聞四日傳太陰更不傳變至十日太陰病衰腹減如故則思飲食五日傳少陰更不傳變至十一日少陰病衰渴止舌乾已而嚏六日傳厥陰至十二日厥陰病衰頭痛少愈大氣皆去精神爽慧明乎此而上章成氏之誤不辨自見矣仲景三百九十七法一百一十三方論仲景傷寒論三百九十七法一百一十三方醫者但能誦之欲條分縷析以實其數者未之前聞也余考太陽上篇六十六法中篇五十六法下篇三十八法陽明篇七十七法少陽篇九法太陰篇九法少陰篇四十六法厥陰篇五十四法來病篇二十法霍亂篇九法陰陽易瘥後勞復篇七法又據舊本太陽中篇不可汗六法移在條辨十五篇內共得三百九十七法太陽篇七十三方陽明篇十方少陽篇一方太陰篇二方少陰篇十四方厥陰篇六方霍亂篇三方陰陽易瘥復四方共得一百一十三方統而論之方者定而不可易者也法者活而不可拘者也非法無以善其方非方無以療其症學者先以方法熟習之後以方法融會之則方可以隨時變而不逾仲景之法法可以隨症立而不外仲景之方由是則超於方亦方也逸於法亦法也若拘拘於一定之軌則而不思變通不惟膠柱鼓瑟抑且浩漫靡窮矣陶氏辨差認十六條非時感冒誤作傷寒非時者四時不正之氣傷寒者冬月殺厲之氣直中陰經誤作傳經熱症稍辨傷寒者即無此誤也夾陰傷寒夾陰中寒誤作正傷寒夾陰者因房勞腎虛必有足冷脈沉之異內傷於寒誤作外傷寒內傷生冷法當濕中外感寒邪理宜發表如狂之症誤作發狂蓄血症每見如狂而發狂者熱邪深重也血症發狂誤作濕熱發黃腹滿小便利此蓄血發黃也色如煙燻一身盡痛小便不利此溫熱發黃蚊迹誤作發癍發癍多見於胸腹蚊迹只見於手足脈洪大煩躁昏憒先紅後赤者癍也脈不大安靜清爽先紅後黃者蚊迹也蚊迹因腎虛誤服涼藥逼其無根之火熏肺而然動少陰血誤作鼻衄少陰病但厥無汗而強發之血從口鼻出名下厥上竭者死鼻衄不過火邪熏肺耳譫語誤作狂言譫語者數數更端狂言者叫號怒罵獨語誤作鄭聲獨語者無人則言鄭聲者頻頻諄復女勞復誤作陰陽易女勞復者愈後交合也陰陽易者女病易於男男病易於女也痞滿誤作結胸不痛為滿痛為結胸噦逆誤作乾嘔噦者厄也乾嘔者有聲無物也並病誤作合病合病者二三經齊病也並病者一經未盡又過一經之傳正陽明腑病誤作陽明經病府病在裡宜下經病在表宜汗陰躁誤作陽狂陰躁脈沉足冷飲水不下咽也陽狂脈實大渴飲水察色法青屬肝木主風主寒主痛面青唇青舌卷囊縮急溫之青而黑青而紅相生者吉青而白枯燥者死赤屬心火主熱太陽面赤當汗陽明面赤惡熱不惡寒便閉譫語可下表里俱熱燥渴脈洪未可下少陽面赤脈弦小柴胡和之少陰下利清穀裡寒外熱面赤四逆湯加蔥白此陰寒逼其浮火上行服寒涼必死赤而青赤而黃相生則吉赤而黑相剋則凶黃屬脾土主濕黃而明者熱也黃而暗者濕也黃而白黃而紅相生則吉黃而青相剋則凶黃色明潤病將愈枯夭者凶白屬肺金主氣血虛白而黑白而黃相生者吉白而赤相剋者凶黑屬腎水主寒主痛黑而白黑而青相生則吉黑而黃相剋則凶黑氣自魚尾入太陰者死自法令人中入口者死察目法目明者吉昏者凶開目欲見人陽症也閉目不欲見人陰症也目中不了了睛不和熱甚也目赤痛者陽明熱也瞑目者將衄血也白睛黃將發黃目睛微定暫時稍動者痰也目眥黃病將愈或反目上視或瞪目直視或目睛正圓或戴眼反折或眼胞陷下皆死症也察鼻法鼻青腹痛冷者死微黑者水氣黃者小便難白者氣虛赤者肺熱鮮明者有留飲也鼻孔乾躁陽明熱將衄鼻孔燥黑如煙煤陽毒也冷滑而黑陰毒也鼻鼾者風溫也鼻塞者風熱也鼻煽者肺風難治察口唇法唇焦黑為脾熱腫赤為熱甚青黑為冷極口苦為膽熱口甜為脾熱口燥咽乾為腎熱舌乾燥渴為胃熱口噤為痙風上唇有瘡狐蟲食臟下唇有瘡惑蟲食肛唇青舌卷唇吻反青環口黧黑魚口氣促唇口顫搖氣出不返皆死症也察舌法在青則無胎在半表半裡白胎而滑在裡則黃胎熱甚則黑胎芒刺不熱不渴黑胎有津為寒舌乃心苗紅為本色故吉黑為水色故凶凡舌硬舌腫舌卷舌短舌強者十救一二舌縮神昏脈脫者死陰陽易舌出數寸者死夏月黑胎可治冬月黑胎難治黑胎刮不去易生刺裂者死凡見舌胎以井水浸青布擦淨舌胎薄荷細末蜜調敷之吐舌者摻冰片末即收察耳法耳輪紅潤者吉或黃或白或黑或青枯燥者凶耳聾腫痛屬少陽可治耳聾舌卷唇青屬厥陰難治察身法身輕能轉側吉身重難轉側凶凡陰症手足冷蜷臥惡寒好向壁臥閉目惡明懶見人陰毒身如被杖重難轉側凡陽症身輕手足暖開目喜見人皮膚潤澤者生枯燥者死頭重視深天柱骨倒者死循衣摸床兩手撮空神去而魂亂也脈浮而洪身汗如油喘而不休形體不仁乍靜乍亂此為命絶察聲少陰咽中有瘡則不語太陰火來乘金則無聲出言壯厲先輕後重為外感有餘之症語言懶怯先重後輕為內傷不足之症怒罵叫號奔走不定謂之狂言無人則言見人則止謂之獨言語無倫次數數更端謂之譫語一事一語頻頻諄復謂之鄭聲睡則多言喚醒則止謂之睡中呢喃出言不正旋自知非謂之錯語鼻塞聲重為傷風唇瘡聲啞為狐惑口噤攣搐為痙症鼻鼾語澀為風溫笑為心聲呼為肝聲哭為肺聲歌為脾聲呻為腎聲察脈浮大動數滑為陽沉澀弱弦微為陰浮候舉指於皮膚之上輕手得之曰浮主在表之症浮緊有力無汗惡寒為寒傷營浮緩無力有汗惡風為風傷衛中候尋指於肌肉之間不重不輕而得曰中主半表半裡之症洪而長者陽明胃脈也弦而數者少陽膽脈也沉候按指於筋骨之下重手得之曰沉主在裡之症沉數有力為熱邪傳裡沉遲無力為直中陰經浮為表屬陽沉為里屬陰遲則為寒數則為熱數大無力為陽中伏陰浮數有力為純陽浮緊有力為寒在表沉實有力為陰中伏陽沉細無力為純陰沉數有力為熱邪傳裡浮而遲澀浮而軟散皆虛浮而緊數浮而洪滑皆實沉而細弱沉而遲伏皆虛沉而滑數沉而堅大皆實乍大乍小乍數乍疏此為死脈亦為祟脈細察浮中沉三候而別其有力無力則陰陽表裡虛實自無遁情但能於此精求臨症萬無一失陽症之脈以大則病進小則病退陰症之脈以沉伏病進遲緩病退汗後脈當安靜躁亂者死溫後脈當漸出歇止者死表症而脈伏者有邪汗也昏沉而脈靜者欲戰汗也陰症見陽脈者生真陽來復之象任受補也陽症見陰脈者死正氣衰微之象不任受攻也足脈二條一曰趺陽又名衝陽又名會源陽明胃脈也在足面大指間五寸骨間動脈是也病勢危篤當診趺陽以察胃氣之有無蓋土為萬物之母後天之根本也經曰衝陽絶死不治一曰太溪少陰腎脈也在足內踝後跟骨上陷中動脈是也病勢危篤當診太溪以察腎氣之有無蓋水為天一之元先天之根本也經曰太溪絶死不治太陽脈似少陰少陰症似太陽辨太陽脈似少陰少陰症似太陽雖曰相似治法不同脈沉發熱同也以其有頭疼故名太陽病陽症脈當浮今反不浮而沉里必虛寒也身體疼痛但宜救里使正氣內強逼邪出外用乾薑生附出汗而解若里不虛寒則必脈浮正屬太陽麻黃湯症矣脈沉發熱同也以其無頭疼故名少陰病陰症當不熱今反發熱寒邪在表未傳於裡但皮膚鬱閉而為熱如在裡無熱用麻黃附子細辛湯麻黃髮表間之汗附子溫少陰之經假使寒邪在裡則外必無熱當見吐利厥逆等症正屬少陰四逆症矣蓋少陰表邪浮淺發熱反為輕太陽正氣衰微脈沉反為重熟附配麻黃發中有補生附配乾薑補中有發仲景之旨微矣從症不從脈四條脈浮為表治宜汗之若脈浮大心下硬有熱屬臟者攻之不令發汗脈沉為里治宜下之若少陰病始得之反發熱脈沉者麻黃附子細辛湯微汗之脈促為陽治宜清之若脈促而厥冷炙之溫之此又非促為陽盛之論矣脈遲為寒治宜溫之若陽明脈遲不惡寒身體濈濈汗出用大承氣下之此又非遲為陰寒之論矣四者皆從症不從脈也從脈不從症四條表症宜汗此其常也然發熱頭痛脈反沉身體疼痛當救其里用四逆湯里症宜下此其常也日晡發熱屬陽明脈浮者宜汗用桂枝湯結胸症具宜陷胸湯下之然脈浮大者不可下下之則死當治其表身疼痛者宜桂枝麻黃解之然尺中遲者不可汗營血不足故也當調其營四者皆從脈不從症也合病並病論合病者兩陽經或三陽經齊病不傳者也並病者一陽經先病未盡又過一經而傳者也太陽陽明並病若並未盡所謂太陽症不罷面赤佛郁煩躁短氣是傳未盡尚有表症當麻黃桂枝各半湯汗之若並已盡所謂太陽症罷潮熱手足汗出便硬譫語當承氣湯下之三陽合病皆自下利太陽陽明合病葛根湯太陽少陽合病黃芩湯少陽陽明合病調胃承氣湯陽厥陰厥辨陽厥者初得病身熱頭疼以後傳入三陰大便閉小便赤譫渴躁亂見諸熱症而發厥者熱極反兼勝已之化也熱微厥亦微宜四逆散熱深厥亦深宜承氣湯陰厥者初得病無身熱頭疼面寒肢冷引衣蜷臥見諸寒症而發厥者輕則理中湯重則四逆湯二厥之脈皆沉陰厥沉遲而弱指頭常冷陽厥沉而滑指頭常溫傷寒禁忌誤投麻黃汗多亡陽誤投承氣下多亡陰老弱虛人但當微利或豬膽或煉蜜導之尺脈弱者禁下寸脈弱者禁吐吐蛔一症雖有熱症大忌寒涼誤服必死初愈勿驟進參耆邪氣得補即復脈虛神倦者不在禁例宜隨機活變傷寒欲飲水為欲愈不可禁絶不可多與初愈勿過飽勿勞動勿憂怒勿行房勿食羊肉勿多飲酒勿輕見風死症歌兩感傷寒不須治陰陽毒過七朝期黑癍下厥與上竭陽症見陰脈者危舌卷耳聾囊更縮陰陽交及摸尋衣重暍除中皆不治唇吻青兮面黑黧咳逆不已並臟結溲屎遺失便難醫汗出雖多不至足口張目陷更何為喘不休與陰陽易離經脈見死當知結胸症具煩躁甚直視搖頭是死時少陽症與陽明合脈弦長大救時遲汗後反加脈躁疾須知臟厥死無疑用火法服發表藥汗不得出用薪火燒地長久掃去以熱水灑之取蠶沙柏葉桃葉少加粳麩皆鋪燒地上約厚三寸鋪席令病人臥多被密覆汗即至矣候周身至腳心俱透用溫粉白朮藁本川芎白芷米粉各等分為細末撲之汗止上床最得力者蠶沙桃柏葉也粳麩乃助其厚耳用水法水七碗燒鍋令赤投水待沸取起再燒鍋赤又以水投之如此七次取湯一碗乘熱飲之溫覆取汗神效熱甚者以青布浸新汲水中貼病人胸前熱則易之或置病人於水中或浸手足或漱口表未解及陰症似陽者忌之摘陶氏七法發狂難制醋炭氣入鼻即定方可察其陰陽以脈之有力無力為辨腹痛有陰有陽將涼水半碗與病人飲之痛減者屬熱痛增者屬寒更參脈來有力無力寒症脈伏或吐瀉脫而無脈以薑汁好酒各半盞與病人服脈出者生不出者死更覆手取之而無脈則絶矣鼻衄不止山梔炒黑為末吹入鼻中外用濕紙搭於鼻沖其血自止吐血不止韭汁磨墨呷之如無韭汁雞子清亦可赤屬火黑屬水有相制之理陰毒昏憒唇青肢冷甲黑藥不得入將蔥一握束緊切去根葉留白三寸如餅將麝半分填臍內後加蔥餅以火尉之爛即易約三餅可醒先灌薑汁後服薑附湯未醒灸關元穴三十壯不醒者必死服藥即吐者生薑汁半盞熱飲吐即止大抵寒藥熱飲熱藥冷飲中和之劑溫飲補湯須用熟慢火久煎利藥不嫌生猛火急煎足太陽經症治太陽膀胱經為諸經之首四通八達之衢故多傳變其經起於目內眥從頭下後項連風府行身之背終於足小指其症頭項痛腰脊強噁心拘急體痛骨節痛發熱惡寒此表症標病脈浮緊有力無汗為表實寒傷營血宜麻黃湯發表浮緩無力有汗為表虛風傷衛氣宜桂枝湯實表散邪身疼熱甚而煩脈浮而緊此傷風見寒脈也身不疼熱少不煩脈浮而緩此傷寒見風脈也俱用大青龍湯發之脈靜為不傳脈躁盛為欲傳如脈浮發熱煩渴小便不利此太陽傳本病宜五苓散利之小便如常者不可利也恐引邪入里為熱結膀胱又不可下恐表邪乘虛入里為痞滿結胸協熱下利雖當汗者亦勿太過恐其亡陽肉瞤筋惕故有汗禁麻黃無汗禁桂枝有汗勿再汗汗多則小便不利足陽明經症治陽明胃經乃兩陽合明於前後腑居中土萬物所歸其經起於鼻交頞中絡目循於面行身之前終於足大指其症目痛鼻乾不眠頭額痛身微熱惡寒脈洪長此陽明標病宜葛根湯解肌身熱渴飲汗出惡熱脈洪數此陽明本病宜白虎湯清熱潮熱自汗譫渴不惡寒反惡熱揭去衣被揚手擲足癍黃狂閉或手足乍冷乍溫腹滿硬痛喘急脈沉數此正陽明腑病調胃承氣湯下之自汗者勿利小便恐津液枯竭也足少陽經症治少陽膽經膽無出入主半表半裡其經起於目鋭眥上頭角絡耳中循胸胃脅行身之側終於足小指其症頭角痛目眩胸脅痛耳聾寒熱嘔口苦胸滿脈弦數此經不從標本從乎中治只用小柴胡湯和解別無他藥禁汗禁吐禁下禁利小便足太陰經症治太陰脾經乃三陰之首故名太陰其經起於足大指上行至腹絡於咽連舌本循身之前其症身熱腹痛咽乾手足溫或自利不渴此熱邪傳入太陰標病柴胡桂枝湯腹滿痛口渴發黃茵陳湯小便赤大便閉是太陰本病桂枝大黃湯初病起不熱不渴頭不痛便怕寒胸腹滿痛或吐瀉手足冷小便清白或嘔厄是本經直中寒邪宜理中湯初病起不熱不渴胸腹滿痛手足冷氣口沉細此內傷生冷宜治中湯足少陰經症治少陰腎經人之根蒂也三陰交中名曰少陰其經起於足心湧泉穴上行貫脊循喉絡舌本下注心胸行身之前其症引衣蜷臥惡寒口躁咽乾譫語口渴便閉脈沉有力此熱邪傳入少陰本病大承氣湯急下之初起身熱面赤足冷本經自受夾陰傷寒標本俱病也麻黃附子細辛湯溫經散寒若陰躁欲坐泥水井中雖欲飲而不受面赤足冷脈沉或脈雖大按之如無此陰極發躁本病也宜四逆合生脈散退陰回陽身熱煩躁面赤足冷脈數大無力此虛陽伏陰標本俱病宜加減五積散溫解表裡初病起頭不痛口不渴身不熱便厥冷蜷臥腹痛吐瀉或戰栗面如刀刮脈沉細此少陰直中寒邪宜四逆湯急溫之無熱惡寒面青小腹絞痛足冷脈沉蜷臥不渴或吐利昏沉手足甲青冷過肘膝脹滿不受藥此夾陰中寒本病也宜人參四逆湯溫補之六經之中惟此經難辨以燥渴便閉脈沉實知其熱脈沉遲別其寒足厥陰經症治厥陰肝經三陰交盡名曰厥陰乃六經之尾其脈起於足大指上環陰器抵小腹循脅上口唇與督脈會於巔行身前之側其症煩滿囊拳消渴舌卷譫語便閉手足乍溫乍冷脈沉有力此熱邪傳入厥陰本病大承氣湯急下之寒熱似瘧脈浮緩此熱邪在經標病柴胡桂枝麻黃各半湯不嘔清便不藥自愈初病起不熱渴不頭疼便怕寒厥冷或小腹至陰痛或吐瀉體痛嘔涎沫唇面手足甲俱青冷過肘膝舌卷囊縮脈沉微此直中本病茱萸四逆湯急溫之可汗頭項體痛或腰痛背強或肢節痛拘急或灑灑惡寒或翕翕發熱或煩熱脈浮緊或浮數皆表症也宜發其汗不可汗無表症或身有汗或口燥舌乾或口苦咽乾或咽中閉塞或亡血虛家或淋瀝瀉利或陰虛勞倦或夢遺精滑或臍旁動氣或風溫濕溫中暑或瘡痛或厥或産後或經水適來適斷或太陽與少陽並病頭項強痛眩冒心下痞頭痛而熱脈弦細屬少陽經或脈沉或脈微弱並不可汗可下蒸蒸發熱便閉或潮熱腹滿痛或潮熱譫語或陽明自汗胃燥譫閉或陽明無汗小便不利懊憹必發黃或脈滑譫語或潮熱手足腋下汗出譫閉或目中不了了便閉或小便不利乍難乍易微熱喘滿不臥有燥屎或吐後脹滿不減或下利脈滑數為宿食或下利臍腹硬痛或痞滿燥實癍黃狂閉揭去衣被揚手擲足或汗吐下後微煩小便數大便難或轉失氣或小腹滿痛小便利大便黑為蓄血皆可下也不可下脈雖沉有表症或惡風寒或頭背項腰強痛拘急或嘔吐或腹脹時滿時減或不轉失氣或腹脹可按或有動氣或腹如雷鳴或陽明面赤或咽中閉塞或夾陰面赤或硬在心下或小便清白或內傷或房勞或胎前或産後或崩漏或經水適來適斷或脈虛或脈浮大或緊皆不可下可吐病在膈上或胸滿多痰或食在胃口或胸滿微煩或胸中懊憹或胸中痛欲按或寸口脈滑或寒氣在胸煩滿或寸脈沉伏或乾霍亂心腹刺痛皆宜吐之不可吐邪在膈下或膈上寒乾嘔者宜溫忌吐或老弱或素虛或陰虛或房勞或胎前産後經水適來適斷或脈虛細皆不可吐可溫直中陰經或無熱惡寒或嘔吐不止或冷痛泄瀉或戰栗蜷臥面如刀括或四肢逆冷或夾陰面青或下後利不止或舌卷囊縮厥冷或胃寒厄逆脈沉遲無力者悉當溫之不可溫燥渴咽乾或身熱小便赤或喜飲冷或大便閉或脈數大有力皆不可溫急下五症急者病勢危篤不可稍緩也少陰舌乾口燥恐熱消腎水大承氣湯急下之少陰自利純清水心下硬痛燥渴大承氣湯急下之陽明汗多熱甚恐胃汁干大承氣湯急下之目睛不明腎水已竭熱而便閉大承氣湯急下之陽明腹滿痛為土實急用大承氣湯下之急溫二症少陰內寒已甚陽氣欲絶急用四逆湯少陰膈上有寒飲乾嘔不可吐者急用四逆湯溫之發熱發熱者無休止也潮熱者時熱時止如潮之有汛也煩熱者虛而煩躁發熱也太陽發熱頭痛項強腰脊痛身痛骨節痛惡寒無汗脈緊麻黃湯惡風有汗脈浮枝桂湯發熱煩渴小便不利太陽傳本病五苓散陽明發熱目痛鼻乾不眠微惡寒頭額痛脈洪長葛根湯表裡俱熱口渴脈洪數白虎湯譫狂渴閉惡熱脈沉數承氣湯少陽發熱耳聾脅痛寒熱嘔口苦頭角痛脈弦數小柴胡湯三陰惟少陰有表熱但脈沉足冷麻黃附子細辛湯下利厥裡寒外熱人參四逆湯汗後發熱脈躁疾下利熱不止皆死惡寒寒邪客於榮衛故惡寒身雖熱不欲去衣被也雖里症悉具而微惡寒亦表未解當先解其外俟不惡寒方可攻裡太陽發熱惡寒麻黃湯少陰無熱惡寒四逆湯汗後惡寒桂枝芍藥湯陽明背微惡寒口渴心煩白虎加人參湯少陰口中和背惡寒附子湯少陰惡寒厥冷自利煩躁脈不至者死惡風邪風傷衛故惡風悉屬於陽三陰經症並無惡風也太陽無汗惡風麻黃湯有汗惡風桂枝湯汗後不解表裡俱熱時時惡風煩渴白虎加人參湯汗多亡陽惡風桂枝朮附湯風濕相搏骨節痛短氣小便不利自汗惡風甘草附子湯潮熱一日一發屬陽明症如潮之有信旺於未申故日晡乃發陽明潮熱大便硬與大承氣湯不硬者不與先與小承氣轉失氣者燥糞也可與大承氣不轉失氣者初硬後心溏慎勿攻攻之則脹滿不食太陽病小有潮熱大結胸大陷胸湯潮熱者外欲解可攻裡也手足汗出者大便已硬大承氣湯譫語潮熱有燥屎大承氣湯潮熱大便溏小便利胸脅滿小柴胡湯往來寒熱邪在半表半裡表多則寒甚里多則熱甚或往或來日二三發非如瘧疾之止作有時也傷寒十餘日熱結在裡往來寒熱大柴胡湯往來寒熱胸脅滿心煩喜嘔或心下悸小便不利小柴胡湯已汗復下胸脅滿小便不利渴而不嘔但頭汗出心煩往來寒熱柴胡桂枝幹薑湯煩熱心中熱而煩擾亦有屬寒者或在表或在裡或半表半裡或因陰虛火動或因氣虛或因心虛太陽汗解後復煩脈浮數桂枝湯太陽汗後脈浮數煩渴五苓散太陽吐下後表裡俱熱惡風煩渴白虎加人參湯汗吐下後心煩不眠梔子豉湯下後心煩腹滿梔子厚朴湯汗吐下後微煩小便數大便硬小承氣湯悸而煩小建中湯陽明下利後虛煩梔子豉湯下後煩尚有燥屎大承氣湯少陽胸滿而煩寒熱小柴胡湯兼驚小便不利譫語身重柴胡桂枝龍骨牡蠣湯少陰欲寐而煩自利而渴小便白四逆湯服白通湯後利不止厥逆無脈乾嘔而煩白通湯加豬膽汁心煩不得臥黃連阿膠湯厥陰厥冷而煩脈乍結乍緊心中滿瓜蒂散陰虛火動而煩生脈散氣虛自汗脈虛而煩補中益氣湯煩躁煩為煩擾心病也故煩字從火躁為憤躁腎病也故躁字從足有在表在裡之分有火劫陽虛之異太陽發熱惡寒身痛無汗脈浮急大青龍湯太陽下後胃干煩躁不眠欲飲水者少與之若脈浮小便不利而渴五苓散煩躁不大便小便少者初硬後必溏須小便利屎硬乃可攻大承氣湯下後復汗煩躁不眠夜則安靜不嘔不渴無表症脈沉微身無大熱乾薑附子湯汗下後不解煩躁不渴脈沉微茯苓四逆湯陽明病五六日不大便繞臍痛煩躁有燥屎承氣湯少陰吐利厥冷煩躁者死吳茱萸湯厥陰脈沉而厥膚冷而躁無時暫安為臟結死懊憹憹即惱字古人通用鬱郁不舒憒憒無奈比之煩躁殆有甚焉因誤下故表邪乘虛內陷伏於胸間故懊憹也太陽脈浮動數頭痛發熱微汗出惡寒表未解也短氣懊憹梔子柏皮湯汗吐下後不眠懊憹梔子豉湯陽明下後外有熱手足溫懊憹頭汗出梔子豉湯陽病下之懊憹尚有燥屎大承氣湯陽明無汗小便不利懊憹必發黃茵陳湯頭痛巔頂腦後痛者太陽也頭額痛者陽明也頭角痛者少陽也三陰脈至頸而還故無頭痛惟厥陰脈會於巔故亦有頭痛然風溫病在少陰經溫病在太陰而頭反痛至於陰毒亦然此痰與氣逆壅而上氣不得降故頭痛是又不可拘拘為也太陽頭頂痛有汗惡風桂枝湯無汗惡寒麻黃湯陽明頭額痛目痛鼻乾不眠脈微洪葛根解肌湯加川芎升麻陽明表裡大熱煩渴頭痛竹葉石膏湯陽明頭痛不惡寒反惡熱大便實調胃承氣湯潮熱譫閉渴而頭痛脈沉數有力小承氣湯少陽頭角痛脈弦數小柴胡湯加川芎厥陰頭痛吐涎沫吳茱萸湯太陰頭痛氣逆有痰也二陳湯加枳實川芎細辛少陰頭痛足寒而氣逆也麻黃附子細辛湯項強太陽項強無汗脈浮緊麻黃湯有汗脈浮緩桂枝湯痙症獨搖頭卒口噤項強小續命湯結胸項強如柔痙狀下之則和大陷胸丸搖頭內有痛則搖頭裡症也風痙則獨搖頭心絶則頭搖狀如煙煤直視者死風主搖動故頭搖多屬風風脈必弦神術湯加天麻羌活防風殭蠶頭眩眩者頭旋眼花也因汗吐下後上焦虛也少陽發竅在目且居表裡之間表邪漸入於裡表中陽虛故目眩也發汗過多言亂目眩者死太陽汗吐下後表裡俱虛必眩冒真武湯加川芎天麻太陽汗後不解心下悸頭眩肉瞤振振劈地真武湯加川芎天麻陽明頭眩不惡寒能食而咳茯苓白朮甘草生薑湯加川芎天麻少陽目眩運脈弦數小柴胡湯加川芎天麻挾血虛者四物芎麻湯有痰火者加酒芩竹瀝挾氣虛者補中益氣湯加芎麻少陰利止頭眩時時自冒者死身體痛體痛乃六經俱有之症有表裡寒熱風濕之分太陽宜汗汗後脈沉遲者宜溫中暍者宜白虎湯裡寒外熱者宜先救里而後攻表寒在三陰者脈沉風在三陽者脈浮中濕者身重痛不可轉側陰毒者身大痛宛如被杖太陽體痛無汗惡寒脈浮緊麻黃湯體痛有汗惡風脈浮緩桂枝湯少陰體痛吐利肢冷四逆湯厥冷下利身痛如被杖嘔逆茱萸四逆湯一身盡痛發熱面黃熱結在裡小便利大便閉為蓄血輕則犀角地黃湯重則桃仁承氣湯風濕一身盡痛身重不可轉側小便不利五苓散加蒼朮羌活霍亂體痛脈沉桂枝湯表裡俱寒下利清穀身痛救里四逆湯後救表桂枝湯無汗有邪在表者有邪行里者有水飲內蓄者有陽虛者搗生薑綿裹周身擦汗自出太陽無汗而喘麻黃湯太陽無汗煩躁大青龍湯陽明無汗渴欲飲水無表症者白虎加人參湯少陰脈沉發熱無汗麻黃附子細辛湯少陰但厥無汗強發之必動其血或從口鼻或從目出名下厥上竭者死投麻黃湯三大劑而不得汗者死汗雖出不至足者死熱病脈躁盛而不得汗者死自汗不因發散自然汗出也傷風則發熱自汗中暍則汗出惡風風濕則汗多而濡惟傷寒無汗及傳裡而熱亦有自汗又有表裡虛實之分若惡風寒者表未解也宜汗之漏不止而惡風及發汗後而惡寒者皆表虛也宜溫之汗出不惡風寒里症也宜下之陽明發熱汗多宜急下汗出如油如貫珠凝而不流皆死將發披水盆中足露於外用糯米粉龍骨牡蠣為細末周身撲之太陽風傷衛脈浮緩自汗桂枝湯表虛汗不止黃耆建中湯太陽過汗遂漏不止惡風者桂枝附子湯陽明自汗不惡風寒反惡熱譫渴便祕調胃承氣湯陽明自汗小便不利津液竭也急下之大承氣湯肢冷額上手背汗出脈沉細四逆湯自汗小便難身不熱足冷脈沉四逆湯加桂枝苓朮吐逆厥冷脈沉身痛大汗人參四逆湯加桂枝耆朮盜汗睡而汗出覺即汗止故名盜汗睡則胃氣行里而表中陽氣不致故津液泄也覺即氣行於表而止矣雜病盜汗主於陰虛傷寒盜汗邪在半表半裡也陽明潮熱脈浮盜汗黃芩湯三陽合病目合則汗膽有熱也小柴胡湯頭汗諸陽經絡皆循於頭邪搏諸陽乃為頭汗故三陰無頭汗也經曰關格不通不得尿頭有汗者死濕家下之額上汗出小便不利者死下利不止者亦死太陽水結胸無大熱頭微汗大陷胸湯陽明頭汗劑頸而還小便不利而渴瘀熱在裡身必發黃茵陳五苓散陽明下後懊憹頭汗出梔子豉湯頭汗額上偏多者屬心部為血症四物湯加桃仁紅花白朮甘草以益脾土手足汗胃主四肢為津液之主手足汗出為熱聚於胃是津液旁達也經曰手足濈然汗出大便已硬宜下之陽明中寒不能食小便不利手足汗欲作痼瘕不可下陽明譫渴滿閉手足汗出大承氣湯中寒不能食水穀不化手足汗出理中湯動氣藏氣不調肌膚間築築跳動病人先有痞積而後感寒醫者不知妄施汗下致動其氣隨藏所主而見於臍之左右上下獨不言當臍者脾為中州以行四臟之津液左右上下且不宜汗下何況中州其敢輕動乎動氣在右誤汗則衄煩渴飲即吐水先服五苓散次服竹葉湯誤下則津渴咽燥鼻乾眩悸人參白虎湯加川芎動氣在左誤汗則頭眩汗不止筋惕肉瞤先服防風白朮牡蠣湯汗止服小建中湯誤下則腹內拘急食不下雖身熱而蜷臥先服甘草乾薑湯後服小建中湯動氣在上誤汗則氣上衝心李根湯誤下則掌握熱煩身上浮冷熱汗自泄欲得水自灌竹葉湯動氣在下誤汗則無汗心大煩骨節痛目暈惡寒食即吐先服大橘皮湯吐止小建中湯誤下則腹滿頭眩食則下清穀甘草瀉心湯渴凡渴問所飲欲冷欲熱欲多欲少飲多而欲冷者陽渴也飲少而喜溫者陰渴也隔明不甚渴太陰乃大渴有救腎花粉知母是也有利小便茯苓豬苓是也太陽無汗而渴禁白虎湯陽明汗多而渴禁五苓散大抵在表渴少在裡渴多三陽或渴不如三陰之甚也渴欲飲水稍稍與之若不與無以解其枯燥若過多恐成動悸水結胸咳嘔䭇噦腫滿下利等症可不慎哉太陽汗後煩渴少少與水若脈浮小便不利微熱者五苓散六七日不解而煩有表裡症渴欲飲水水入即吐名曰水逆五苓散桂枝湯汗後煩渴脈洪大白虎加人參湯陽明脈長微洪無汗而渴葛根解肌湯陽明惡熱自汗面赤譫渴脈洪數人參白虎湯加花粉黃連陽明腑症譫黃狂渴脈沉數大承氣湯陽毒目赤唇焦鼻如煙煤渴而脈實三黃石膏湯少陽渴小柴胡去半夏加天花粉葛根少陰渴而下利但欲寐小便白四逆湯少陰渴自利純青色水者大承氣湯厥陰消渴大熱甚則譫閉舌卷囊縮大承氣湯食少而渴胃脈弱者宜白朮茯苓勿用涼藥益傷中氣口燥舌乾乾燥俱為熱症有因汗下後而得者有不因汗下而得者或和解或微汗或急下或微下當考兼見之症而施治經謂咽乾不可汗以其多里症故也陽明便硬舌乾口燥者調胃承氣湯少陽口苦舌乾小柴胡湯加天花粉乾葛陽明身熱背惡寒口燥舌乾白虎加人參湯少陰口燥咽乾下利清水色純青恐熱消腎汁大承氣湯急下之燥干脈沉足冷者多死嘔吐嘔者有物有聲而漸出吐者無聲有物而頓出乾嘔者有聲而無物也嘔則或寒或熱吐則但寒無熱蓋邪傳裡多嘔症生薑為嘔家聖藥散逆氣也半夏為嘔家要藥去痰水也嘔家雖有陽明症不可攻者謂氣逆尚未收斂為實也熱者脈數煩渴寒者脈遲逆冷有水氣者先渴後嘔腹滿怔忡有膿血者吐儘自愈不煩治也初病起即嘔吐寒傷胃也霍香正氣散太陽與陽明合病不下利但嘔者葛根半夏湯陽明嘔吐得湯反劇者屬上焦葛根半夏湯太陽與少陽合病下利而嘔黃芩加半夏生薑湯陽明有寒而嘔吳茱萸湯發熱口苦脈弦數而嘔或心煩喜嘔或胸脅滿痛寒熱而嘔或日晡發熱而嘔並用小柴胡湯加半夏生薑潮熱便閉而嘔大柴胡湯太陰腹滿痛脈沉理中湯加藿香薑橘少陰嘔肢冷脈沉細四逆湯加橘半生薑厥陰吐涎沫逆冷脈沉微茱萸四逆湯加橘半少陰欲吐不吐但欲寐五六日利而渴小便白四逆湯似嘔似喘憒憒無奈大橘皮湯主之虛煩嘔吐竹葉石膏湯加薑橘先嘔後渴宜與水解先渴後嘔為水停心下茯苓半夏湯加薑橘嘔而脈弱小便利身微熱厥冷者多難治四逆湯加生薑乾嘔熱在胃脘心下痞結故乾嘔太陽汗出乾嘔桂枝湯少陰下利乾嘔薑附湯表不解心下有水氣身微熱乾嘔微喘或自利小青龍湯太陽頭痛心下痞硬滿乾嘔短氣汗出不惡寒此表解里未和也十棗湯膈上有寒飲乾嘔四逆湯少陰下利厥逆無脈乾嘔而煩白虎湯加豬膽汁噫氣説文云飽食息也俗作噯因胃弱而不和虛氣上逆也汗解後心下痞硬乾噫食臭肋下有水氣腹中雷鳴下利生薑瀉心湯汗吐下後心下痞滿噫氣不下利者旋覆代赭石湯虛而噫氣脈弱神困四君子湯加枳桔薑噦古稱噦者即今所謂厄逆也東垣以噦為乾嘔者非也多因胃寒亦有胃熱不可不辨病人煩躁自覺熱甚他人按其肌則冷此無根失守之火非實熱也乃水極似火若不識此而誤用寒涼下咽則敗矣可不謹乎吐下後虛極得噦胃中寒也理中湯加丁香半夏陽明脈弦浮大鼻乾發黃小便難潮熱時時噦小柴胡湯胃熱便硬承氣湯胃雖熱便未硬瀉心湯胃虛熱而噦橘皮竹茹湯主之因痰而噦半夏生薑湯病人自覺熱他人捫其肌則冷附子理中湯冷服兼以硫黃乳香散嗅之並灸期門中脘氣海關元有瘀血而噦者難治衄血衄者鼻中出血也肺開竅於鼻血得熱則隨火上逆故雜症以衄為裡熱也經曰傷寒失汗致衄與黃麻湯六七日不大便頭痛有熱與小承氣湯小便清者知不在裡仍在表也當發其汗邪解則血不擁盛而迫上故傷寒衄為表熱也古人以血為紅汗故曰奪血者毋汗此為衄過多或脈微者言也成流者不須服藥當與水解點滴者邪猶在經當散其邪經曰少陰病但厥無汗而強發之必動其血或從口鼻或從目出名下厥上竭死症也但頭汗而身無汗亦衄症之逆太陽脈浮緊不發汗致衄者麻黃湯陽明口乾鼻燥脈浮緊必衄黃芩湯陽明漱水不欲咽黃芩芍藥湯衄家脈微犀角地黃湯衄多不止茅花湯加黃芩黃連墨汁衄忌寒藥涼水過多必成蓄血結胸犀角地黃湯重則桃仁承氣湯吐血失汗失下蓄熱而成吐血亦或誤汗誤下所致凡服桂枝湯吐者其後必吐膿血黃芩湯咽痛吐血面赤斑斑如錦紋為陽毒升麻鱉甲湯燥渴吐鮮血黃連解毒湯加丹皮生地吞四生丸不渴吐血如豬肝理中湯加墨汁便膿血便膿血皆是傳經熱邪或與微涼或用疏導陽症血色鮮紅者易治陰症血色如豬肝遲而有力者可治無力者難治凡下血脈小者生身熱脈大者多死陽明下血譫語夜則見鬼為熱入血室小柴胡湯加當歸生地丹皮少陰下利膿血桃花湯色紫黑理中湯主之蓄血當汗不汗則為血結胸腹硬滿手按則痛若小便不利乃水與氣也若小便自利為有蓄血許學士云蓄血在上其人喜忘蓄血在下其人如狂屎血身黃必蓄血太陽不解熱結膀胱其人如狂桃仁承氣湯陽明病喜忘大便黑為蓄血在上犀角地黃湯在中桃仁承氣湯在下抵當湯胸滿脅滿腹滿少腹滿邪氣傳裡先自胸而脅以次入腹也故胸滿多帶表症脅滿多帶半表半裡腹滿多里症少腹滿非溺即血也蓋身半以上同天之陽身半以下同地之陰故在上滿者無形之氣也在下滿者有形之物也在上者因而越之故胸滿宜吐在下者引而竭之故腹滿宜下俱有陰陽之辨不可不察下後脈促胸滿桂枝去芍藥湯太陽與陽明合病喘而胸滿麻黃湯汗下後煩熱胸滿梔子豉湯胸滿氣上衝喉不得息者此胸中有寒痰瓜蒂散胸滿脅痛小柴胡湯太陽不解傳入少陽脅下硬滿乾嘔寒熱脈沉緊小柴胡湯太陽下利嘔逆汗出頭痛胸脅硬滿不惡寒表解里未和也十棗湯胸脅腹滿唇青厥冷脈沉細此生冷傷脾理中湯去參朮加香附脅下素有痞連在臍旁痛引少腹入陰筋者名藏結死腹滿不減為裡實大柴胡湯腹滿時減為裡虛理中湯加木香厚朴太陰誤下腹滿痛桂枝芍藥湯痛甚桂枝大黃湯陽明潮熱譫渴喘祕滿大柴胡湯大實大滿承氣湯噦而腹滿小便難小柴胡加茯苓三陽合病腹滿身痛難轉側譫語口中不仁小柴胡湯少陰六七日不大便腹滿脹痛土不勝水漉漉有聲小半夏茯苓湯加桂腹滿身痛先以四逆湯溫里後以桂枝湯攻表小腹痛小水自利膀胱血結其人如狂桃仁承氣湯太陰身黃小腹滿小便難五苓散陰寒小腹滿痛茱萸四逆湯甚者灸關元厥冷脈沉小腹滿痛冷結膀胱四逆湯生薑搗去汁炒熱揉尉或滿或痛或痰或食或寒或氣俱用此法神良結胸痞經曰病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞以下之太早故也成注云無熱惡寒發於陰誤矣無熱惡寒是為陰症豈有誤下之理又豈止作痞而已哉仲景所謂陰陽者指表裡而言在表當汗而反下之因作結胸病雖在裡尚未入腑而輒下之因作痞也結胸有大小寒熱水血食痰八者之異而痞則所傳猶淺但一味氣凝耳若未經下者不名結胸或痰或食或熱隨症治之不按自痛為大結胸大陷胸湯按之乃痛為小結胸小陷胸湯煩渴便閉為熱結胸大陷胸湯加黃連不熱渴小便清白為寒結胸枳實理中湯怔忡頭汗無大熱揉之有聲為水結胸半夏茯苓湯胸滿痛漱水不咽喜忘如狂大便黑小便利為血結胸犀角地黃湯脈滑喘嗽為痰結胸黃芩半夏生薑湯加枳實氣口脈大為食結胸小陷胸湯加枳實厚朴結胸兼斑黃狂厄者最重脈沉小者死結胸症具煩躁甚者死誤下成痞俟表症罷而後可下柴胡枳桔湯惡寒汗出痞滿附子瀉心湯表未解心下滿名支結柴胡桂枝湯熱甚而痞大黃黃連瀉心湯寒多熱少半夏瀉心湯發癍癍者胃經熱毒也下之太早熱氣乘虛入胃乃致發癍下之太遲熱氣留中不散亦令發癍胃主肌肉故微微隱起實無頭粒小者如芝麻大者如芡實輕者如星布重者如錦紋鮮紅者為胃熱易治紫者為熱甚難治黑者為胃爛必死癍有六症一曰傷寒二曰時氣三曰溫毒四曰陽毒五曰內傷寒六曰陰症此外惟有發疹頗類癍症但診屬肺家肺主皮毛故有頭粒尖起惟癮疹亦如錦紋而無頭粒尤為難辨然疹為肺症必兼鼻塞流涕咳嗽聲重為異耳疹脈多浮大癍脈多洪數疹多發於病之首癍多發於病之尾自不同也獨有時氣發癍亦是病起便見貴乎臨症精思而熟察之嗟乎癍症之發反掌生殺余每深考似有獨得故以下辨論最悉爾一曰傷寒發癍固當汗不汗當下不下或未當下而早下則熱蘊於胃而發癍也身溫足暖脈洪數有力者易治脈沉足冷挾虛者難治癍欲出未出升麻葛根湯發之紫黑者上方加紫草茸脈虛者上方加人參癍已出不宜再發恐傷其氣也煩渴熱盛脈洪數者犀角大青湯譫語便硬大柴胡湯加芒硝麻黃髮表則增癍爛承氣攻裡則必內陷故古有明禁也大青為化癍要藥如無以大藍葉代之凡發癍避忌香臭與痘瘡同凡已出未出之時切不可投寒涼之劑吃生冷物恐冰凝其毒不得發泄也挾虛者必先助真氣往往拘泥而不敢補者多致不救二曰時氣發癍四時不正之氣人感之則寒熱拘急或嘔逆或煩悶或頭痛鼻乾不眠皆癍候也鮮紅稀朗者吉紫黑稠密者凶重者發熱二三日便出輕者發熱三四日而出也必察元氣虛實脈來有力無力為主如虛者先以參胡三白湯助元氣癍未透者升麻葛根湯熱甚加紫草稠密咽腫甘草桔梗玄參知母升麻犀角黃連癍出嘔逆陳皮半夏茯苓黃連甘草生薑三曰溫毒發癍或犯春令溫邪而發或犯冬令寒邪至春始發或冬有非時之溫皆名溫毒治例大抵與傷寒同法但冬令寒而閉藏春令溫而發皇小有分別癍將出未出咳悶嘔吐葛根橘皮湯癍已出宜用黑膏或犀角大青湯化之受邪於春病發於夏亦同此例四曰陽毒發癍大熱狂言目赤鼻黑癍欲出未出須涼以解之乾葛升麻紫草大青陳皮甘草癍紫煩渴三黃石膏湯加犀角大青陽毒發癍或成膿瘡蜜煎升麻塗之五曰內傷寒發癍暑月納涼太過食冷太多內外皆寒逼其暑火浮遊於外而為癍癍不過數點身無大熱脈來沉澀調中湯去麻黃桂枝加厚朴乾薑香薷扁豆六曰陰症發癍狀如蚊迹蚤痕手足多而胸背少其色淡紅稍久則為微黃病人安靜脈來沉細此因元氣素虛或多房事或寒涼太過遂成陰症乃寒伏於下逼其無根失守之火熏灼肺胃傳於皮膚升麻藿香陳皮甘草人參熟附子生薑得溫補之劑陽回而陰火自降此治本不治標也然而此症根本既撥吉少凶多惟老成煉達者拾救四五病家醫家臨斯症者顧可忽乎哉發黃黃者中央土色也故屬陽明太陰之症濕熱交併必發身黃如夏月罨曲因濕熱而生黃也濕勝者一身盡痛色如熏黃而晦熱勝者一身無痛色如橘黃而明更有蓄血亦能發黃但兼小腹硬小便自利其人如狂耳發黃鼻出冷氣寸口近掌無脈者死黃而直視搖頭為心絶黃而環口黧黑為脾絶皆不可治也瘀熱在裡頭汗渴小便難汗不得越如橘之黃且明大便閉者茵陳蒿湯小便難者五苓散加茵陳山梔濕熱發黃一身盡痛小發難色如熏黃之暗胃苓湯加茵陳大便閉者茵陳蒿湯寒濕發黃身疼發熱頭痛鼻塞而煩脈大瓜蒂散搐鼻取水或用防風葛根蒼朮茵陳桔梗甘草陳皮生薑煎服取微汗痞氣發黃半夏泄心湯加茵陳枳實小便難者茵陳五苓散加山梔結胸發黃陷胸湯加茵陳蓄血發黃小腹滿痛小便利大便黑如狂脈沉桃仁承氣湯內傷寒發黃調中湯加茵陳逆冷者加附子陰症發黃脈沉遲肢冷氣促嘔悶或面赤足冷陰躁欲坐泥水井中輕者用理中湯加茵陳重者用四逆湯加茵陳凡治陰黃須熱湯溫之或以盆盛湯令病人坐於上布蘸熱水搭其黃上乃愈發狂熱毒在胃並於心則狂乃邪熱之極也狂之發作少臥不飢妄語笑妄起行登高而歌棄衣而走甚則殺人不避水火罵詈不辨親疏悲怒號哭逾垣上屋皆獨陽亢極非大下之不能已也狂言目反視為腎絶汗出復熱狂言不能食皆死症也發狂奔跳勢不可遏傾好醋於火盆令氣衝於病人鼻內又將薑汁嘖其頭面及身上及手足即定方可察其陽狂陰躁揭開床帳放入爽氣隨用銅鏡按在心胸熱甚者將硝一斤研細涼水一盆青布方一尺者四五塊浸於硝水中微攪半乾搭在病人前心後心頓易冷者得睡與汗乃愈大渴目赤唇焦舌乾齒燥脈實狂妄大承氣湯急下之脈浮無汗醫以火逼取汗必驚狂桂枝湯去芍藥加蜀漆龍骨牡蠣救逆湯汗家重發汗必恍惚心亂小便已陰痛禹餘糧丸太陽病六七日表症仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯太陽病不解熱結膀胱人如狂血自下者愈外不解尚未可攻當先解外外已解但少腹急結者乃可攻之桃仁承氣湯身黃脈沉結少腹硬小便自利其人如狂血症諦也抵當湯陰症發躁欲坐泥水井中面赤足冷脈沉不能飲水霹靂散冷服身微熱面赤足冷脈舉之數大按之無力此虛陽伏陰而躁人參四逆湯冷服按狂之為症多屬實熱非大承氣大下之安能已乎如脈無力者宜三黃石膏湯清之至於蓄血症但如狂非真狂也由於當汗不汗或汗遲或脈盛汗微或覆蓋不周而汗不透太陽之邪無從而出故隨經入腑血結膀胱外症既解方可攻下若夫陰躁真氣敗壞虛陽上越乃陰盛隔陽庸醫不察脈之浮盛沉衰與不能飲水見其面赤身熱誤與涼劑則立斃矣大抵此症肌表雖熱重按之則冷透手矣然陰躁一症十中止救二三惜乎昧者不識識者憂讒束手待盡良可痛也驚悸心之所主者神也神之所依者血也心血一虛神氣失守則舍空而痰水客之此驚悸之所由作也驚者惕惕然不寧觸事易鬱氣郁生痰也悸者築築然跳動蓋以心虛則停水水居火位心實畏之故怔忡而不能自安也傷寒八九日下之胸滿煩驚小便不利譫語一身盡重柴胡加龍骨牡蠣湯火劫汗亡陽驚狂桂枝去芍藥加蜀漆龍骨牡蠣救逆湯二三日悸而煩者小建中湯脈代結心動悸炙甘草湯汗多叉手冒心悸欲得按桂枝甘草湯汗後臍下悸欲作奔豚此心虛而腎氣發動茯苓桂枝甘草大棗湯太陽病汗出不解發熱心悸頭眩身瞤動振振欲劈地真武湯少陽耳聾目赤煩滿不可吐下吐下則悸而驚救逆小柴胡去黃芩加茯苓五六日往來寒熱胸脅滿默默不飲食心煩悸喜嘔微熱或咳小柴胡湯脈弦細頭痛發熱屬少陽不可汗汗則譫語胃不和則煩而悸調胃承氣湯少陰病四逆而悸或小便不利或腹痛泄利四逆散厥而悸者宜先治水茯苓甘草湯霍亂心悸理中丸加茯苓按驚與悸雖有分別總皆心受傷也因陽氣內弱法當鎮固因水飲停留法當疏通飲之為患甚於他邪雖有餘邪必先治水蓋以水停心下無所不入侵於肺為喘傳於胃為嘔溢於皮為腫漬於腸為利故治不可緩也經曰厥而悸者宜先治水夫莫重於厥猶先治水況其他乎振戰栗振者身微動正氣虛寒也戰者身大動邪正相爭也栗者心動邪氣勝也振為輕而戰為重戰在外而栗在內也吐下後心下滿氣上衝頭眩脈沉緊發汗則動經身為振搖茯苓桂枝白朮甘草湯太陽病汗後仍熱心悸頭眩肉瞤身振真武湯按經云下後復發汗及亡血家誤汗必為寒振內外俱虛也又曰表氣微虛裡氣不守邪中於陰則栗乃知振搖之症大抵屬虛素問曰寒邪傷人使人毫毛畢直鼓頷戰栗此素有邪當發其汗仲景云脈浮而緊按之反芤此為本虛當戰汗而解又三部脈浮沉遲數同等必戰汗而解若脈浮數按之不芤其人不虛汗自出而解不發戰也外不戰但內栗者陰中於邪也凡傷寒欲解則戰而汗出此邪不勝正也若正不勝邪雖戰無汗為不可治矣筋惕肉瞤汗多亡陽津液枯而筋肉失養故筋惕惕而跳肉瞤瞤而動也脈微弱汗出惡風誤服大青龍湯則厥逆筋惕肉瞤真武湯太陽病已汗仍發熱頭眩身瞤振真武湯或人參養榮湯吐下後復發汗虛煩脈微心痞脅痛氣衝眩冒動惕久而成痿桂枝苓朮甘草湯大抵此症因於汗者十有七八不因於汗素稟血虛邪熱搏血亦見此症又有未嘗發汗七八日筋惕而肉不瞤潮熱大便閉小便澀臍旁硬痛此燥屎也大柴胡下之一虛一實治法相懸臨症者可以不詳察乎瘛瘲瘛者筋脈急而縮縱者筋脈緩而申一申一縮手足牽引搐搦風主動搖故也汗下後日久瘛瘲此虛極生風小續命湯加減不因汗下瘛瘲羌防芩連天麻四物之類汗出露風汗不流通手足搐搦牛蒡根散風溫被火劫發微黃色瘛瘲葳蕤湯肝為風木之臟而主筋風火搏捖多患瘛瘲當平肝降火佐以和血有痰者二陳竹瀝為主屬虛者補中益氣為先如應用小續命者有汗去麻黃無汗去黃芩此常法也若戴眼上視汗出如珠凝而不流太陽絶也又有四肢𮒸𮒸動而不已似瘛瘲而無力抽搐者肝絶也汗下過度日久變出者多不可治胃實不大便有大便不通有大便難有大便硬皆陽明胃實之候六七日不大便頭痛有熱與承氣湯小便清者知不在裡仍在表也桂枝湯陽明病無汗而喘麻黃湯陽明病脅下硬滿而嘔舌上白胎小柴胡湯陽明病過十日脈浮小柴胡湯陽明病自汗若發汗小便自利者津液內竭雖硬不可攻蜜煎導之陽明病潮熱不大便少與小承氣不轉失氣者無燥屎不可攻轉失氣者有燥屎可攻大承氣湯陽明病不吐不下心煩調胃承氣湯陽明小便不利大便乍難乍易時有微熱喘冒不臥有燥屎也大承氣湯傷寒六七日目中不了了睛不和無表裡症大便難身微熱大承氣湯急下之脈浮則胃氣強脈澀則小便數浮澀相搏大便則難其脾為約麻仁丸陽明症喜忘大便色黑必有蓄血抵當湯無表裡證下後脈數不解善飢六七日不大便者有瘀血按仲景或曰陽明潮熱不大便與小承氣不轉失氣者初硬後必溏不可攻之此胃中初熱未作實者也或曰太陽病下之腹滿初硬後必溏此虛熱在上無燥屎者也或曰陽明病中寒不能食小便不利手足濈然汗出欲作痼瘕初硬後必溏以水穀不分也或曰小便少者服承氣湯若不大便六七日小便少者初硬後必溏須小便利屎必硬乃可攻之乃知仲景測大便法皆以小便驗之然小便利屎必硬固為可攻亦有小便利大便硬而不可攻者何也陽明自汗或發汗小便自利此津液內竭雖硬不可攻待其自欲大便與蜜煎導之夫胃雖實有表者汗之半表半裡者和之不因胃實便下也此仲景心法精考詳求自無妄下之誤矣自利自利者不因攻下而自利俗名漏底是也六經皆有自利表裡寒熱治各不同太陽表不解心下有水氣乾嘔發熱而咳或渴或利或小便不利少腹滿或喘小青龍湯太陽與陽明合疾必自下利葛根湯太陽病外症未除而數下之遂挾熱而利心下痞硬表裡不解桂枝人參湯太陽與少陽合病自利黃芩湯若嘔者黃芩加半夏生薑湯太陽少陽並病而反下之成結胸下利不止水漿不下其人心煩生薑瀉心湯或小陷胸湯太陽病反下之利遂不止脈促者表未解也喘而汗出葛根黃芩黃連湯太陽病二三日不能臥心下必結脈微弱者本有寒也反下之若利止必結胸未止者四日復下之此協熱利也黃芩湯硬滿嘔煩下之痞益甚胃虛氣逆也甘草瀉心湯汗解後心下痞乾噫食臭脅下有水氣腹中雷鳴下利生薑瀉心湯太陽下利頭痛心下痞脅下痛乾嘔短氣汗出不惡寒此表解里未和也十棗湯十三日過經譫語者熱也當下之若小便利者大便當硬而反下利醫以丸藥下之非其治也自利者脈當微今反和者內實也調胃承氣湯下後利不止身痛者急當救里四逆湯身痛便調急當救表桂枝湯下利心痞復下之利不止治以理中利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯過經十餘日欲吐胸中痛大便反溏微滿微煩調胃承氣傷以上皆太陽陽明病潮熱大便溏胸脅滿小柴胡湯無表裡症發熱七八日脈雖浮數可下下後脈數不解而利不止必便膿黃芩湯柏皮湯陽明少陽合病必下利其脈不滑而數有宿食也大承氣湯臟結如結胸狀如故時時下利寸脈浮關脈小細沉緊舌上胎滑者難治以上皆陽明十三日不解胸脅滿而嘔日晡潮熱微利此本柴胡症下之不利今反利者誤以丸藥下之也潮熱者實也先以柴胡解外復以柴胡加芒硝此條當屬少陽自利不渴屬太陰臟有寒也四逆輩太陰病脈弱自利設當行芍藥大黃者宜減之以胃弱易動故也脈浮而緩手足溫者當發身黃若小便利者不發黃至七八日雖暴下利必自止以脾家穢腐當去故也平胃散加穿山甲以上皆太陰少陰病欲吐不吐但欲寐五六日自利而渴者少陰虛故引水自救若小便色白者下焦虛寒四逆湯少陰病下利咽痛胸滿心煩豬膚湯少陰病四逆泄利下重四逆散少陰病下利六七日咳而嘔渴心煩不眠豬苓湯少陰病下利清水純青心下痛口乾燥大承氣湯急下之少陰腹痛小便不利下利膿血桃花湯少陰病腹痛小便不利肢重而痛自下利者此為水氣或咳或嘔或小便利者真武湯少陰病下利清穀裡寒外熱厥逆脈微反不惡寒面赤或腹痛或乾嘔或咽痛或利止脈不出通脈四逆湯少陰病下利脈微與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁服湯後脈暴出者死微續者生少陰病脈緊至七八日自利脈微手足反溫脈緊反去者為欲解也必自愈少陰病脈沉微欲臥汗出而煩欲吐自利煩躁不寐者死少陰病利止眩冒者死少陰病惡寒身蜷而利手足逆冷者死以上皆少陰下利欲飲水者熱也白頭翁湯厥陰病脈浮而遲表熱裡寒下利清穀四逆湯大汗出熱不去內拘急四肢疼下利厥逆惡寒四逆湯下利清穀不可攻表汗出必脹滿四逆湯下利脈沉遲面少赤身微熱下利清穀者必鬱冒汗出而解下虛必微厥四逆湯發熱下利厥逆躁不得臥者死發熱下利厥不止者死汗不止者亦死下利脈反實者死以上皆厥陰按下利有寒熱之分最宜詳辨凡寒瀉者口不燥渴臍下多寒小便清利脈來沉遲細軟無力完穀不化糞色淡白或淡黃色或如騖溏或身雖熱手足逆冷皆為寒也凡熱瀉者口必燥渴臍下多熱小便黃赤或澀而不利脈來數大或浮或滑或弦糞色焦黃或熱而臭或糞出聲響得涼藥與冷飲則減得熱藥與熱飲則增皆為熱也熱瀉亦有邪熱不殺穀者與寒瀉之完穀不化相似當以他症及脈色辨之身不熱手足溫者屬太陰經身體四逆屬少陰厥陰二經身熱者皆屬陽明經然陰利有反發熱者不可因其熱遂以為陽也未可下而早下之內虛熱入名為挾熱下痢凡胃虛脈弱熱渴自利者必用四君子湯如發熱者四君子加柴胡黃連若腹滿小便不利五苓散合理中湯嘔則加藿香半夏陳皮生薑濕則加蒼朮脹則加厚朴腹痛加芍藥木香如脈浮者表邪未解小青龍去麻黃加芫花此散表兼治水也凡下利不可發汗當先治利利止則正氣復而邪自解蓋因利內虛若誤汗之則內外皆虛變證危殆腹痛邪傳於裡與正氣搏則為腹痛太陽經無腹痛症少陽經有胸脅痛而無腹痛陽明經腹滿而痛此為裡實三陰下利清穀而腹痛者此為裡寒太陰腹痛當分虛實腸鳴泄瀉而痛者也便祕按之轉痛者實也傷寒陰脈澀陰脈弦當腹中急痛先與小建中湯不瘥者與小柴胡湯胸中有熱胃中有邪腹痛嘔吐黃連湯往來寒熱胸脅滿煩嘔腹痛小柴胡湯陽明病不大便五六日繞臍痛煩躁此有燥屎大承氣湯大下後六七日不大便煩而腹痛有宿食也大承氣湯發汗不解腹滿痛急下之大承氣湯少陰病二三日不已至四五日腹痛小便不利肢重自利此有水氣真武湯少陰病下利清穀裡寒外熱厥逆脈微反不惡寒面赤腹痛通脈四逆湯少陰病四逆或咳或悸或小便不利腹痛泄利四逆散少陰病腹痛便膿血桃花湯厥陰四五日腹痛若轉氣下趨少腹者欲下利也四逆湯按腹痛有虛有實有寒有熱有食有血當詳辨之可按可揉而軟者虛也不可揉按而硬者實也身無大熱口中不渴喜飲熱湯者寒也身熱口渴喜飲涼水者熱也噫氣惡食氣口脈實者食也痛有定處而不動移或脅或小腹硬滿小便利大便黑者血也大抵脈大而有力者可涼可下脈沉而無力者宜補宜溫更以症參之百不失一矣譫語譫語者妄有所見呢喃而語不倫於理也多言稍有次第者獨語如見鬼者睡中呢喃者皆熱之輕也音聲高厲言之不休者熱之重也狂言叫喊罵詈不辨親疏神明昏亂熱之最甚也皆因胃中熱盛上乘於心心為熱冒故也脈短則死脈和則愈又身微熱脈浮大者生逆冷脈沉者死或氣逆喘滿或氣下奪而自利皆為逆也陽明病譫語潮熱脈滑而疾與小承氣湯轉失氣者更服不轉失氣者勿服陽明病譫語潮熱反不能食必有燥屎大承氣湯陽明病汗多胃燥便硬則譫語小承氣湯脈浮自汗微惡寒攣急誤與桂枝攻表胃不和而譫語調胃承氣湯三陽合病腹滿身重口中不仁面垢遺尿自汗譫語白虎湯傷寒四五日脈沉喘滿沉為在裡反發其汗津液越出大便為難表虛里實久則譫語大承氣湯脈弦頭痛發熱屬少陽不可汗汗則譫語汗多亡陽譫語不可下柴胡桂枝湯和營衛以通津液自愈下後胸滿煩驚小便不利譫語一身盡痛柴胡加龍骨牡蠣湯熱入血室在男子陽明病下血譫語小柴胡湯加黃連栝蔞婦人中風發熱惡寒經水適來晝則明瞭暮則譫語小柴胡湯加生地黃丹皮當歸十三日過經不解譫語者熱也當以湯下之小便利者大便當硬而反下利脈調和者知以丸藥下之非其治也若自利者脈當微厥今反和者內實也調胃承氣湯下利譫語脈滑數有燥屎也此湯飲傍流所利皆稀水可下之承氣湯氣虛獨言脈無力者補中益氣湯虛則鄭聲蓋鄭重頻煩語言諄復也謂止將一事頻煩諄復不能如譫語之數數更端也成注為鄭衛之聲誤矣四逆脈微鄭聲四君子湯甚者參附湯送黑錫丹按實則譫語虛則鄭聲二者本不難辨但陽盛裡實與陰盛隔陽皆致錯語須以他症別之如身熱煩渴大便閉小便赤乃陽盛裡實也小便清白大便洞泄發躁乃陰盛隔陽也小便不利因汗而小便不利者津液亡於外也因下而小便不利者津液耗於內也痞症或發黃及熱病而小便不利者皆熱鬱所致也傷寒表不解心下有水氣乾嘔發熱而咳小便不利少腹滿或喘小青龍湯去麻黃加茯苓太陽病大汗後胃干煩躁不眠欲飲小便不利脈浮者五苓散不浮者豬苓湯太陽病飲水多心下悸小便少茯苓甘草湯太陽發汗遂漏不止則惡風小便難四肢難屈伸桂枝加附子湯身黃小腹硬脈沉結茵陳湯表未解反下之不結胸但頭汗出小便不利必發黃茵陳湯或梔子柏皮湯小便不利大便乍難乍易微熱喘冒不能臥有燥屎也大承氣湯少陽往來寒熱胸脅滿不欲食心煩喜嘔或心下悸小便不利小柴胡湯八九日下之胸滿煩驚小便不利譫語身重柴胡加龍骨牡蠣湯少陰小便不利大便自利腹痛四肢沉重有水氣也真武湯厥陰小便不利關節疼痛汗出惡風身腫者屬風濕甘草附子湯厥陰少陰寒閉或灸氣海或行蔥尉法按仲景大法在太陽症脈浮用五苓散不浮用豬苓湯二方皆以豬苓茯苓澤瀉為主但五苓散加白朮與桂辛甘為陽也豬苓湯加阿膠滑石甘寒為陰也陽明熱黃與梔子柏皮湯脅痛身黃與小柴胡湯少陰有水則行真武厥陰寒祕則行四逆其汗多亡陽者以桂枝加附子湯後世以渴者與八正散不渴者與知柏地黃補仲景之未備也大都汗多者津液外泄小便因難不可利之恐重亡其津液待汗止小便自行也又有熱甚而小便仍利者勿妄利之恐引熱入於膀胱往往變為蓄血也小便自利小便數小便自利有在表者有在裡者有因熱者有因寒者六經俱有此症宜詳考而條分之小便數者頻欲去而不多也在三陽經有表裡之分在三陰經並無此症不可不詳辨也太陽病六七日表症仍在脈微而沉反不結胸其人發狂以熱在下焦小腹硬滿小便自利抵當湯傷寒有熱應少腹滿小便不利今反利者為有血也宜抵當丸不宜他藥十三日過經譫語小便利大便亦利脈反和調胃承氣湯不大便六七日小便少者初硬後溏未可攻如小便已利大承氣湯陽明自汗更發汗小便自利為津液內竭屎雖硬不可攻蜜煎導小便自利而大汗下利清穀內寒外熱脈微欲絶四逆湯脈浮自汗小便數心煩微惡寒腳攣急慎不可行桂枝湯甘草乾薑湯芍藥甘草湯脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約麻仁丸太陽汗吐下後微煩小便數大便因硬小承氣湯和之則愈按小便不利者初硬後溏未可下小便已利而汗多津液已竭不可下小便不利而小腹硬者溺也當滲泄之小便利而少腹硬者非血則屎也當疏利之發黃而小便利則為可治腹滿而小便利則為欲解濕熱而小便利則不能發黃發譫而至循衣摸床小便利為可治則小便之當察也審矣小便數者太陽陽明治各有條若腎虛有熱者生脈散加知柏蓮子脾腎俱虛者補中益氣加生脈知柏而法無遺用矣遺溺遺溺者小便自出而不知也夫膀胱所以瀦水者也下焦虛故不能約攝也三陽合病腹滿身重口中不仁面垢譫語遺尿白虎湯邪中下焦陰氣為栗足冷遺溺四逆湯太陽病火尉其背大汗譫語振栗下利欲小便不得反嘔而失溲此為欲解遺溲狂言目反直視此為腎絶按陽症熱甚神昏而遺尿者易治陰症逆冷脈微而遺尿者難治宜益智桂附以溫其下若厥陰囊縮逆冷四逆加吳茱萸汗下後陰虛宜參芍術草知柏經曰水泉不止者膀胱不藏也腎虛則膀胱之氣不能約束也東垣又謂遺溺屬肺虛氣陷宜補中益氣合生脈知柏更以他證及色脈詳之則自無遁情矣口苦咽乾口乾舌乾咽通六經口為脾竅舌為心苗津為腎液俱屬熱而無寒也惟誤汗誤下及虛人久病者方與溫經耳有因汗下者有不因汗下者或和或解或微汗或微下或急下當考兼見之症而為施治也太陽咽乾不可發汗津液竭也脈浮自汗小便數心煩微惡寒腳攣急本桂枝附子症反與桂枝湯攻表便厥咽乾煩躁吐逆甘草乾薑湯吐下後不解表裡俱熱惡風大渴舌乾而煩白虎加人參湯太陽病重發汗復下之不大便五六日舌燥干日晡潮熱心腹硬滿痛大陷胸湯陽明病口乾燥漱水不欲咽必衄犀角地黃湯陽明汗下後口乾舌燥渴白虎加人參湯少陽口苦咽乾目眩小柴胡湯少陰自利清水色純青心下痛口乾燥急下之大承氣湯少陰病二三日便口燥咽乾急下之大承氣湯按活人謂脾熱則津枯固矣然白虎湯症言表裡俱熱則三陽俱矣口燥咽乾及自利純青皆急下者救少陰也脈沉者附子湯加知柏門冬五味花粉汗下後大虛脈微古人嘗以補中益氣合生脈知柏安可專主脾熱一症哉眩眩者目黑暗而無常主也腦體空虛也眩冒者昏冒也少陽口苦咽乾目眩者邪漸入里而表中陽虛也太陽少陽並病眩者虛也頭眩與眩冒皆由汗吐下後陽虛也陽明中風頭眩不惡寒此為風也若言亂目眩即為死症吐下後逆滿頭眩脈沉緊發汗則動其經身為振搖茯苓桂枝白朮甘草湯吐下後脈微心下痞硬脅痛氣上衝眩冒動惕久而成痿真武湯陽明病但目眩不惡寒葛根湯加天麻川芎少陽病口苦咽乾目眩小柴胡湯加天麻川芎動氣在左誤汗則頭眩汗不止筋惕肉瞤小建中湯少陰下利止而眩冒者死咳嗽有聲無痰者咳也有聲有痰者嗽也肺主氣肺傷則氣逆而咳或寒或熱或表或里或半表半裡或停飲各常分剖古云咳為肺疾發散則愈然亦有不可發散者如經曰咳而小便不可發汗發汗則肢厥又曰咳而發汗蜷而苦滿腹堅為逆是也太陽表不解心下有水氣乾嘔喘咳小青龍湯少陽往來寒熱胸脅滿默默不欲飲食心煩嘔咳小柴胡去人參加五味子乾薑少陰病四逆而咳四逆散加五味子乾薑少陰病下利咳而嘔渴心煩不眠豬苓湯少陰病腹痛小便不利肢重痛自下利為有水氣其人咳者真武湯加五味子細辛乾薑按表寒咳嗽者三拗麻黃裡熱咳嗽者梔芩桑杏少陽咳嗽小柴胡加五味乾薑胸中痞滿枳桔瓜杏陰症脈沉四逆加五味細閲仲景治例不分陰症陽症必用五味乾薑蓋乾薑辛溫散肺家逆氣五味甘酸收肺家浮氣故也喘肺主氣形寒飲冷則傷肺故氣逆上行急迫而張口抬肩是名為喘或水寒射肺者或邪在表者或邪在裡而喘心腹必濡而不堅若腹滿即為可下至於汗出如油喘而不休及直視譫語而喘滿者皆死症也太陽病無汗而喘麻黃湯太陽與陽明合病喘而胸滿不可下麻黃湯表不解心下有水氣乾嘔而喘小青龍湯汗後飲水多必喘小青龍湯加杏仁豬苓喘家有汗桂枝湯加厚朴杏仁汗下後不可更行桂枝若汗出而喘無大熱者麻黃杏仁甘草石膏湯太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出葛根黃芩黃連湯陽明口苦咽乾腹滿微喘發熱惡寒脈浮緊麻黃湯陽明脈浮緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重白虎湯五苓散脈沉喘滿沉為在裡反發其汗津液越出大便為難表虛里實久則譫語大承氣湯陽明脈遲汗出不惡寒身重腹滿而喘手足濈然汗出大便已硬大承氣湯小便不利大便乍難乍易微熱喘冒不臥有燥屎也大承氣湯陰症喘促四肢逆冷返陰丹按心火刑金肺受迫而喘呼如人有難而叫號故古人以諸喘為惡至於陰喘則無根虛火泄越於上根本將脫更為危惡華他曰盛則為喘指邪氣盛非肺氣盛也所謂瀉白者非瀉肺也瀉邪氣以救肺也故曰氣即是火其義瞭然短氣氣急而短促不能相續似喘而不抬肩似呻吟而無痛苦或為實或為虛或在表或在裡或屬陰或屬陽或飲多而水停心下各宜詳審短氣骨節痛汗出小便不利惡風身腫為風濕甘草附子湯短氣腹滿脅痛脈弦浮大外不解無汗嗜臥身黃小便難潮熱小柴胡湯表未解短氣手足濈然汗出或潮熱大承氣湯若表解心下痞硬乾嘔短氣十棗湯下後心中懊憹硬痛大陷胸湯按汗吐下後脈微氣不能續則與異功散陰症脈沉逆冷難以布息則與四逆湯加人參飲多水停則與茯苓甘草湯皆補仲景之未備也鬱冒即昏迷也鬱結而氣不舒昏冒而神不清也經云虛寒則為鬱冒然有宜下者太陽下後復汗表裡俱虛致冒汗出則表和自愈里未和然後復下小承氣湯陽明小便下利大便乍難乍易微熱喘冒不臥有燥屎也大承氣湯少陰但欲寐利止而眩冒者死厥陰不利清穀脈沉遲面赤身微熱必鬱冒汗出而解按海藏謂心火熏肺所以神昏若下之則誤矣宜梔子芩連湯脈浮在丙宜導赤散脈沉在丁宜瀉心湯劉河間云熱者脈必數然熱甚而反致沉細謂為寒者誤也宜解毒加大承氣下之或失下而脈微昏冒者若急下之則殘陰暴絶不下亦死以解毒湯養陰退陽則脈和而生仲景曰血虛而厥厥而必冒又曰少陰下利止眩冒者死蓋虛極而脫也或虛或實細心明辨之不能言太陽發汗已身猶灼熱名風溫脈尺寸俱浮自汗身重多眠鼻鼾語言難出葳蕤湯少陰病咽中生瘡不能言語苦酒湯惑病蟲蝕咽喉上唇有瘡則聲嗄甘草瀉心湯痙症口噤不能言剛痙用葛根湯柔痙用桂枝湯加栝蔞熱病喑啞不言三四日不得汗出者死火邪刑金聲啞芩連甘桔知母黃連麥冬五味風熱壅盛咳嗽聲嗄荊防甘桔薄荷花粉知母怫鬱乃面赤也陽氣怫鬱在表故面色發赤雖由於熱然六經俱無可下之症亦有陰寒症水極似火者須以他症別之太陽病如瘧狀脈微惡寒面反熱色身癢桂枝麻黃各半湯小汗之太陽發汗不徹轉屬陽明續微汗出不惡寒若太陽症不罷不可下可小發汗設面色緣緣正赤陽氣怫鬱在表當汗之麻黃湯陽明面赤不可攻葛根湯少陰小利清穀厥逆脈微反不惡寒通脈四逆湯加蔥白面赤如錦紋咽喉痛吐膿血者陽毒也陽毒升麻湯吐蛔氣上衝心疼飢不欲食吐蛔者厥陰病桂枝白朮茯苓湯理中安蛔散靜而時煩此為藏寒蛔上入膈須臾復止得食而嘔又煩蛔聞食臭出當吐蛔烏梅丸病人有寒復發汗胃中冷必吐蛔先服理中湯次服烏梅丸按吐蛔主胃寒人所共知然亦有屬陽症者如脈來洪大數實或渴或祕或癍或黃皆以冷劑取效切不可執一也凡吐蛔症勿服甘草勿食甜物蓋蛔蟲得甘則動得苦則安得酸則止得辛則伏也循衣摸床手弄衣被及摸床者必兼撮空此肝家之熱肝將絶故見危惡之症太陽中風以火發汗邪風被火兩陽相熏其身發黃陽盛則衄陰盛則小便難但頭汗出口乾咽爛或不大便譫語甚者噦捻衣摸床小便利者可治吐下後不解不大便日晡潮熱不惡寒獨語如見鬼狀劇則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死大承氣湯按循衣摸床必兼見撮空及怵惕肝主筋肝熱甚故動惕也脈弦則肝木未敗故生脈澀則金旺而木欲絶故死仲景主下者因其不大便也若內無燥屎而脈重按無力者往往以大補氣血而愈此法外之變通也目直視視物而不轉睛也五臟六腑之氣皆上注於目邪氣壅盛冒其正氣則神識不慧藏精之氣不能上榮於目則直視此邪氣已極正氣已壞吉少凶多者也故曰狂言直視為腎絶直視搖頭為心絶直視譫語喘滿者死直視下利者死衄家不可汗汗則額陷脈緊急直視不能眴肝受血而能視亡血則肝虛又發汗亡陽則陰陽俱虛此症雖逆尚可以補劑救十中之一二也風溫被下小便不利直視失溲仲景無治法目中不了了睛不和無表裡症大便難微熱為實大承氣湯厥厥者四肢冷也逆者手足冷也邪在三陽則熱傳至太陰則溫至少陰則逆至厥陰則厥故成氏以為厥甚於逆而王履非之似亦不必厥有陰陽之殊最當詳慎太陽脈浮自汗小便數心煩微惡寒腳攣急反與桂枝攻表誤也得之便厥咽乾煩躁吐逆甘草乾薑湯陽明脈滑而厥里有熱也白虎湯三陽合病腹滿身重口不仁面垢譫語遺尿發汗則譫語下之則額汗手足逆冷若自汗者白虎湯少陰吐利手足厥冷煩躁欲死吳茱萸湯少陰病下利清穀裡寒外熱厥逆脈微反不惡寒面赤或腹痛或乾嘔或咽痛或利止脈不出通脈四逆湯少陰四逆或咳或悸或小便不利或腹痛泄利四逆散厥而悸者宜先治水卻治其厥不爾水漬入胃必作利也茯苓甘草湯下後寸脈沉遲厥逆下部脈不至咽喉不利吐膿血泄利為難治麻黃升麻湯厥冷脈細欲絶當歸四逆湯厥冷脈乍緊者邪結胸中瓜蒂散一二日至四五日厥者必發熱厥深者熱亦深厥微者熱亦微承氣湯下之若誤汗之必口傷爛赤少陰惡寒身蜷而利逆冷者不治少陰吐利煩躁四逆者死少陰但厥無汗強發之必動其血或從口鼻或從目出名下厥上竭為難治逆厥者不可下發熱下利厥不止者死下利厥逆無脈灸之不溫脈之還反微喘者死按厥有陰陽辨之宜精陰厥者初得病便逆冷脈沉遲足攣惡寒或引衣自蓋或不喜飲水或下利清穀或清便自調外症安靜手足心冷指甲青冷脈按無力法當溫之陽厥者初病必身熱小便赤大便祕渴飲煩躁不眠動轉不寧至二三日後方發厥其脈雖沉按之必滑手足心溫指甲微溫法當清之或下症悉具而見四逆是因失下血氣不通承氣湯下之其曰逆冷不可下者為真寒者言也若夫火極似水而厥則手足心溫指甲亦溫非下何以救乎不得臥不得眠者陽明病也胃不和則臥不安也或因汗下而心血虧損或因煩熱而輾轉不寧或因瘥後餘熱未盡陰氣未復皆令人不得臥也太陽病二三日不得臥心下必結脈微弱者寒也桂枝加厚朴杏子湯太陽脈浮數身疼無汗煩躁不眠汗之麻黃湯下後復汗晝日煩躁不得眠夜而安靜不嘔不渴無表症脈沉微身無大熱乾薑附子湯衄家不可汗汗則額上陷脈緊急直視不眴黃芩芍藥湯下後心煩復滿臥起不安梔子厚朴湯汗吐下後虛煩不得眠心中懊憹梔子豉湯身熱目痛鼻乾不得臥尺寸脈俱長陽明病也小便不利大便乍難乍易微熱喘冒不臥有燥屎也大承氣湯陽明脈浮緊咽燥口苦喘滿發熱汗出不惡寒反惡熱煩躁不眠梔子豉湯少陰病欲寐二三日後心煩不得臥黃連阿膠湯少陰病下利欲寐六七日後咳而嘔渴心煩不得眠豬苓湯少陰病但欲寐脈沉細煩欲吐至五六日自利復煩躁不得寐者死發熱下利厥逆煩躁不得臥者死按不得眠皆為熱症夫心為丙丁之主邪火炎灼則神不休息魂氣飛揚不能歸肝而臥也其在太陽汗下後晝日煩躁不眠一症雖用附子乾薑湯蓋復其汗下所亡之陽非治其所感之寒也若汗下後虛煩甚而脈微弱者加味溫膽湯與梔子烏梅湯均稱要劑但欲寐衛氣者晝則行陽夜則行陰行陽則寤行陰則寐陽氣虛陰氣強盛則目瞑乃邪傳於陰不在陽也昏昏閉目者陰主關也但欲寐是少陰本病然亦有熱者太陽病十日脈浮細嗜臥外已解也胸滿脅痛者小柴胡湯按此條當是太陽少陽合病少陰但欲寐口燥咽乾急下之大承氣湯少陰欲吐不吐但欲寐五六日自利而渴少陰虛故引水自救小便白者下焦虛寒四逆湯若小便黃赤而渴者白頭翁湯風溫汗出身重鼾睡語言難出葳蕤湯按嗜臥亦有陰陽之殊少陰脈微細但欲寐或蜷臥或向壁臥四肢逆冷身體沉重皆陰症也附子湯溫之如熱氣內伏神氣昏倦令人多眠小柴胡湯誠為要劑奔豚氣從少腹上衝心而痛如豕突之狀必臍下築築而動一由誤汗一由燒針太陽發汗後臍下悸者欲作奔豚茯苓桂枝甘草大棗湯燒針令汗針處被寒核起而赤必發奔豚氣從少腹上衝心灸核上各一壯桂枝加桂湯按奔豚為少陰之氣非肉桂能泄其邪也除中脈遲厥冷下利當不能食若反能食者名曰除中不可治其症有二一由誤服黃芩湯涼藥而致者必死一則熱少厥多胃氣在者可治此不因藥故也肉疴頑痹不知痛癢也汗出太多營與衛俱虛血氣不和肌肉失養故也汗後雖近衣絮猶尚肉疴羌活沖和湯加桂枝當歸木香主之
