front:
  text: 自序傷寒證治自古難之始於仲景後賢纂述無慮百家而在人耳目間者十有餘種不患其不備患其多而眩也寡聞者無問即漁獵甚富而玄英未辨只如侏儒觀場隨眾喧喝疇能千支萬派匯歸一源而有張長沙若合符節耶自非丹鉛幾偏而髓竭心枯者未易語也余發始燥便讀仲景書今且雪盈巔矣上下南陽易水間紙敗墨渝始成授珠十帙乙酉春杪集甫竣而毀於兵火己丑春孟謀梓之而艱於費且念多則惑少則得古語諄切今授珠雖備於義而後學或苦其繁曷若以一莖筆現丈六紫金俾入門徑而登高捷乎遂以授珠刪繁去復簡邃選玄僅得十之二而竟無漏義矣顏曰括要謂括義詳而徵詞簡也及門之能諳其義而噓枯振槁獨有許石子一見頷之且汲汲於壽世乃捐金付諸剞劂或謂傷寒多緒易於舛誤是刻帙不盈寸遂足指南乎余應之曰擬登泰山非徑奚為欲指扶桑無舟莫適非謂執此可以盡廢百家謂諳此可以折衷千古也夫病機繁雜變遷無窮如珠走盤縱橫不可測雖縱橫不可測而終不出此盤也是帙者其珠之盤乎審是帙者其持盤者乎操通靈之法以應無窮之變惟變取適而不膠於法斯善讀括要者矣順治六年歲次己丑上元日盡凡居士李中梓士材甫識
