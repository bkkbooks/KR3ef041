body:
  text: 凡例一仲景為傷寒鼻祖雖後賢蜂起莫能越其範圍然有發仲景之奧旨補仲景之未備者無不採收更附以一得之愚使學者一覽無餘不致遺珠之嘆耳一釋仲景書者惟成無己最為詳明然智者一失時或有之必本諸經文要諸至理詳為條辨用正千古之訛非敢以臆見妄肆譏評也一仲景立方動以斤計或稱升合者何其多也及考其用末藥只服方寸匕丸藥如梧桐子大者多不過三十粒又何其少也丸散湯液豈得如此懸絕耶千金本草皆以古三兩為今一兩古三升為今一升可為準則蓋衡數以二十四銖為兩漢制六銖錢四個為一兩宋制開元錢十個為一兩大約羌三分之一耳且仲景湯液並分三次服則輕重止得三分之一而服法又得三分之一豈非古之一兩僅得今之一錢乎局方綱目概以今之五錢作為一劑則失之太少陶氏吳氏各以意為重輕盡變古法則其失更甚茲刻方藥悉選仲景古本不敢輕於變古也但世有古今時有寒暑地有南北藥有良獷人有強弱惟明達者隨在變通為得耳一前輯授珠每一症先列仲景全文次列後賢續論次列管窺總釋茲刻欲其簡便不能盡遵全文有復字及不緊要字稍稍節去然其要旨固已摭拾無剩矣一仲景傷寒論例凡曰太陽病者皆謂脈浮惡寒頭項強痛也凡曰陽明病者皆謂胃家實也凡曰少陽病者皆謂口苦咽乾目眩也凡曰太陰病者皆謂腹滿痛吐利也凡曰少陰病者皆謂脈微細但欲寐也凡曰厥陰病者皆謂氣上衝心痛吐蛔也如少陰病反發熱脈沉用麻黃附子細辛湯者謂脈沉細但欲寐而又反發熱者用是方也後人不解其意不察少陰病所括脈微細但欲寐之症第見發熱脈沉便用麻黃附子細辛湯大失仲景之旨姑舉一以例其餘一後賢以慎重太過凡仲景重劑輒以輕劑代之如以沖和湯代麻黃湯之類不可枚舉而仲景之微奧隱矣殊不知有是病則服是藥如鑰之配鎖不可移易者也其禍人者皆藥不對症耳彼易以輕劑者是欲以柔士任強弓安望其中的哉茲刻悉遵古法第詳別脈症自無妄投之失矣一仲景傷寒論暨金匱要略誠為千古醫宗但文辭簡古義味深玄非熟讀深思未易明瞭不揣膚俚將以註疏暢其言外之旨開其晦蝕之光客嗣布之以就正有道
